<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bangkok — Particle Simulation</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body {
    margin: 0; padding: 0; background: #ffffff; color: #2a2a2e;
    font-family: -apple-system, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow: hidden; height: 100%;
  }
  #app { position: fixed; inset: 0; }
  .hud {
    position: fixed; left: 20px; bottom: 18px; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(40, 40, 48, 0.55); pointer-events: none; user-select: none;
  }
  .hud b { color: rgba(20, 20, 24, 0.85); font-weight: 500; }
  .corner {
    position: fixed; right: 22px; top: 18px; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(40, 40, 48, 0.5); text-align: right;
    pointer-events: none; user-select: none;
  }
  .corner small { display: block; color: rgba(40, 40, 48, 0.35); font-size: 9px; margin-top: 4px; }
  #loader {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; background: #ffffff; z-index: 50;
    transition: opacity 0.8s ease; pointer-events: none;
  }
  #loader.gone { opacity: 0; }
  .ring {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(40,40,48,0.15);
    border-top-color: rgba(20,20,24,0.75);
    animation: spin 1.1s linear infinite;
  }
  .lbl {
    font-size: 10.5px; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(40,40,48,0.6);
  }
  #lblText { min-width: 280px; text-align: center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  canvas { display: block; }

  /* top-left page nav — switches between scenes */
  .page-nav {
    position: fixed;
    top: 18px;
    left: 22px;
    z-index: 60;
    display: flex;
    gap: 20px;
    font-size: 10.5px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .page-nav a {
    color: rgba(40, 40, 48, 0.45);
    text-decoration: none;
    padding-bottom: 4px;
    border-bottom: 1px solid transparent;
    transition: color 160ms ease, border-color 160ms ease;
  }
  .page-nav a:hover { color: rgba(20, 20, 24, 0.85); }
  .page-nav a.active {
    color: rgba(20, 20, 24, 0.95);
    border-bottom-color: rgba(20, 20, 24, 0.35);
  }
  .debug-menu {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 70;
    width: 286px;
    max-height: calc(100vh - 36px);
    overflow: auto;
    padding: 12px;
    background: rgba(250, 250, 252, 0.94);
    border: 1px solid rgba(40, 40, 48, 0.14);
    color: rgba(28, 28, 32, 0.78);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 12px 34px rgba(40, 40, 48, 0.08);
  }
  .debug-menu__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    color: rgba(20, 20, 24, 0.9);
    letter-spacing: 0.18em;
  }
  .debug-menu__title {
    display: grid;
    gap: 3px;
  }
  .debug-menu__title small {
    color: rgba(40, 40, 48, 0.42);
    font-size: 8px;
    letter-spacing: 0.14em;
  }
  .debug-menu__section {
    margin: 11px 0 7px;
    color: rgba(20, 20, 24, 0.78);
    letter-spacing: 0.18em;
  }
  .debug-menu__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .debug-menu label {
    display: grid;
    gap: 4px;
  }
  .debug-menu__check {
    grid-template-columns: 1fr auto;
    align-items: center;
  }
  .debug-menu input,
  .debug-menu textarea {
    width: 100%;
    border: 1px solid rgba(40, 40, 48, 0.16);
    background: rgba(255, 255, 255, 0.82);
    color: rgba(20, 20, 24, 0.82);
    font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: 0;
    padding: 6px;
    outline: none;
  }
  .debug-menu input:focus,
  .debug-menu textarea:focus {
    border-color: rgba(20, 20, 24, 0.38);
  }
  .debug-menu input[type="color"] {
    height: 27px;
    padding: 2px;
  }
  .debug-menu input[type="checkbox"] {
    width: auto;
    justify-self: end;
  }
  .debug-menu textarea {
    height: 112px;
    margin-top: 8px;
    resize: none;
    text-transform: none;
  }
  .debug-menu__actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .debug-menu__actions--wrap {
    flex-wrap: wrap;
  }
  .debug-menu__actions--wrap button {
    min-width: 120px;
  }
  .debug-menu button {
    flex: 1;
    min-width: 74px;
    border: 1px solid rgba(40, 40, 48, 0.18);
    background: rgba(255, 255, 255, 0.72);
    padding: 7px 8px;
    color: rgba(20, 20, 24, 0.76);
    font: inherit;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .debug-menu button:hover {
    background: rgba(252, 225, 50, 0.24);
    border-color: rgba(40, 40, 48, 0.28);
  }
  .debug-menu button.active {
    background: rgba(252, 225, 50, 0.42);
    border-color: rgba(40, 40, 48, 0.34);
    color: rgba(20, 20, 24, 0.9);
  }
  .debug-menu__toggle {
    flex: 0 0 auto !important;
    min-width: 58px !important;
    padding: 6px 8px !important;
  }
  .debug-menu.is-collapsed {
    width: 150px;
    overflow: visible;
  }
  .debug-menu.is-collapsed .debug-menu__head {
    margin-bottom: 0;
  }
  .debug-menu.is-collapsed .debug-menu__body {
    display: none;
  }
  @media (max-width: 700px) {
    .page-nav {
      top: 16px;
      left: 18px;
      gap: 16px;
      font-size: 10px;
      letter-spacing: 0.22em;
    }
    .corner {
      top: 48px;
      left: 18px;
      right: 18px;
      max-width: calc(100vw - 36px);
      text-align: left;
      font-size: 9px;
      line-height: 1.35;
      letter-spacing: 0.2em;
    }
    .corner small {
      font-size: 8px;
      line-height: 1.4;
    }
    .hud {
      left: 16px;
      right: 16px;
      bottom: 14px;
      font-size: 10px;
      line-height: 1.6;
    }
    .debug-menu {
      left: 16px;
      right: 16px;
      bottom: 14px;
      width: auto;
    }
    .debug-menu.is-collapsed {
      left: auto;
      width: 150px;
    }
  }

</style>
</head>
<body>
<div id="app"></div>
<nav class="page-nav" aria-label="Scene pages">
  <a class="active" href="city-particles.html">City</a>
  <a href="solar-panel-farm.html">Solar farm</a>
</nav>
<div id="loader">
  <div class="ring"></div>
  <div class="lbl" id="lblText">Loading Bangkok map data…</div>
</div>
<div class="corner">
  BANGKOK · 13°45′N 100°30′E
  <small id="cityHudStatus">OSM BUILDINGS -- · PARTICLE DENSITY 1.00 · CAMERA CUSTOM</small>
</div>
<div class="hud">
  <b>drag</b> to orbit &nbsp;·&nbsp; <b>scroll</b> to zoom &nbsp;·&nbsp; <b>right-drag</b> to pan
</div>
<div class="debug-menu" id="cityDebug">
  <div class="debug-menu__head">
    <div class="debug-menu__title">
      <span>Debug</span>
      <small>City camera</small>
    </div>
    <button class="debug-menu__toggle" id="toggleDebugPanel" type="button">Hide</button>
  </div>
  <div class="debug-menu__body">
    <div class="debug-menu__section">Camera</div>
    <div class="debug-menu__grid">
      <label>Cam X <input id="cameraX" type="number" step="1" /></label>
      <label>Cam Y <input id="cameraY" type="number" step="1" /></label>
      <label>Cam Z <input id="cameraZ" type="number" step="1" /></label>
      <label>FOV <input id="cameraFov" type="number" min="20" max="100" step="1" /></label>
      <label>Zoom <input id="cameraZoom" type="number" min="0.1" max="10" step="0.01" /></label>
      <label>Clip Near <input id="cameraNear" type="number" min="0.01" step="0.1" /></label>
      <label>Clip Far <input id="cameraFar" type="number" min="1" step="100" /></label>
      <label>Target X <input id="targetX" type="number" step="1" /></label>
      <label>Target Y <input id="targetY" type="number" step="1" /></label>
      <label>Target Z <input id="targetZ" type="number" step="1" /></label>
      <label>Fade Near <input id="fadeNear" type="number" min="0" step="1" /></label>
      <label>Fade Far <input id="fadeFar" type="number" min="1" step="1" /></label>
      <label>Max Polar Deg <input id="maxPolar" type="number" min="1" max="179" step="1" /></label>
    </div>
    <div class="debug-menu__section">Camera Shots</div>
    <div class="debug-menu__actions debug-menu__actions--wrap">
      <button id="shotLowOrbit" type="button">Low Orbit</button>
      <button id="shotTopographic" type="button">Topographic</button>
      <button id="shotMacro" type="button">Macro</button>

    </div>

      <button id="setCameraKeyB" type="button">Set B</button>

      <button id="returnCameraKeyB" type="button">Return to B</button>

    <div class="debug-menu__actions">
      <button id="playCameraMove" type="button">Play</button>
      <button id="resetCameraMove" type="button">Reset</button>
    </div>
    <div class="debug-menu__section">Particles</div>
    <div class="debug-menu__grid">
      <label>Point Scale <input id="particleScale" type="number" min="0.1" max="5" step="0.05" /></label>
      <label>Point Alpha <input id="particleAlpha" type="number" min="0" max="3" step="0.05" /></label>
      <label>Point Density <input id="particleDensity" type="number" min="0" max="10" step="0.05" /></label>
      <label>Bldg Density <input id="particleBuildingsDensity" type="number" min="0" max="10" step="0.05" /></label>
      <label>River Density <input id="particleRiverDensity" type="number" min="0" max="10" step="0.05" /></label>
      <label>Street Density <input id="particleStreetDensity" type="number" min="0" max="10" step="0.05" /></label>
      <label>Stream Density <input id="particleStreamDensity" type="number" min="0" max="10" step="0.05" /></label>
      <label>Traffic Density <input id="particleTrafficDensity" type="number" min="0" max="10" step="0.05" /></label>
      <label>Wind Density <input id="particleWindDensity" type="number" min="0" max="10" step="0.05" /></label>
      <label>Point Color <input id="particleColor" type="color" /></label>
      <label>Color Mix <input id="particleColorMix" type="number" min="0" max="1" step="0.05" /></label>
      <label>Point Blur <input id="particleBlur" type="number" min="0" max="1" step="0.05" /></label>
      <label>Wobble <input id="particleWobble" type="number" min="0" max="4" step="0.05" /></label>
      <label>Twinkle Speed <input id="twinkleSpeed" type="number" min="0" max="8" step="0.1" /></label>
      <label>Twinkle Amt <input id="twinkleAmount" type="number" min="0" max="1" step="0.05" /></label>
      <label>River Speed <input id="streamSpeed" type="number" min="0" max="5" step="0.05" /></label>
      <label>Traffic Speed <input id="trafficSpeed" type="number" min="0" max="5" step="0.05" /></label>
      <label>Flow Speed <input id="emberSpeed" type="number" min="0" max="5" step="0.05" /></label>
    </div>
    <div class="debug-menu__section">Interaction</div>
    <div class="debug-menu__grid">
      <label class="debug-menu__check">Building Hover <input id="buildingHoverEnabled" type="checkbox" /></label>
    </div>
    <textarea id="debugData" readonly spellcheck="false"></textarea>
    <div class="debug-menu__actions">
      <button id="copyDebugData" type="button">Copy</button>
      <button id="resetCameraData" type="button">Reset Cam</button>
      <button id="resetParticleData" type="button">Reset Particles</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

// ============================================================
// CONFIG — central Bangkok bbox (Rattanakosin, Silom, Sathorn,
// Chinatown, Sukhumvit beginning + Chao Phraya river bend)
// ============================================================
const BBOX = { south: 13.715, west: 100.490, north: 13.770, east: 100.555 };
const CENTER_LAT = (BBOX.south + BBOX.north) / 2;
const CENTER_LON = (BBOX.west  + BBOX.east ) / 2;

// equirectangular projection → meters, then scale to scene units
const M_PER_DEG_LAT = 110574;
const M_PER_DEG_LON = 111320 * Math.cos(CENTER_LAT * Math.PI / 180);
const SCENE_SCALE = 0.18; // 1 scene unit ≈ ~5.5 m

function project(lat, lon) {
  return new THREE.Vector2(
    (lon - CENTER_LON) * M_PER_DEG_LON * SCENE_SCALE,
    -(lat - CENTER_LAT) * M_PER_DEG_LAT * SCENE_SCALE
  );
}

// ---------- renderer / scene / camera ----------
const container = document.getElementById('app');
const debugEls = {
  panel: document.getElementById('cityDebug'),
  cameraX: document.getElementById('cameraX'),
  cameraY: document.getElementById('cameraY'),
  cameraZ: document.getElementById('cameraZ'),
  cameraFov: document.getElementById('cameraFov'),
  cameraZoom: document.getElementById('cameraZoom'),
  cameraNear: document.getElementById('cameraNear'),
  cameraFar: document.getElementById('cameraFar'),
  targetX: document.getElementById('targetX'),
  targetY: document.getElementById('targetY'),
  targetZ: document.getElementById('targetZ'),
  fadeNear: document.getElementById('fadeNear'),
  fadeFar: document.getElementById('fadeFar'),
  maxPolar: document.getElementById('maxPolar'),
  cameraAnimDuration: document.getElementById('cameraAnimDuration'),
  particleScale: document.getElementById('particleScale'),
  particleAlpha: document.getElementById('particleAlpha'),
  particleDensity: document.getElementById('particleDensity'),
  particleBuildingsDensity: document.getElementById('particleBuildingsDensity'),
  particleRiverDensity: document.getElementById('particleRiverDensity'),
  particleStreetDensity: document.getElementById('particleStreetDensity'),
  particleStreamDensity: document.getElementById('particleStreamDensity'),
  particleTrafficDensity: document.getElementById('particleTrafficDensity'),
  particleWindDensity: document.getElementById('particleWindDensity'),
  particleColor: document.getElementById('particleColor'),
  particleColorMix: document.getElementById('particleColorMix'),
  particleBlur: document.getElementById('particleBlur'),
  particleWobble: document.getElementById('particleWobble'),
  twinkleSpeed: document.getElementById('twinkleSpeed'),
  twinkleAmount: document.getElementById('twinkleAmount'),
  streamSpeed: document.getElementById('streamSpeed'),
  trafficSpeed: document.getElementById('trafficSpeed'),
  emberSpeed: document.getElementById('emberSpeed'),
  buildingHoverEnabled: document.getElementById('buildingHoverEnabled'),
  data: document.getElementById('debugData'),
  togglePanel: document.getElementById('toggleDebugPanel'),
  copy: document.getElementById('copyDebugData'),
  resetCamera: document.getElementById('resetCameraData'),
  resetParticles: document.getElementById('resetParticleData'),
  setCameraKeyA: document.getElementById('setCameraKeyA'),
  setCameraKeyB: document.getElementById('setCameraKeyB'),
  returnCameraKeyA: document.getElementById('returnCameraKeyA'),
  returnCameraKeyB: document.getElementById('returnCameraKeyB'),
  playCameraMove: document.getElementById('playCameraMove'),
  resetCameraMove: document.getElementById('resetCameraMove'),
  shotLowOrbit: document.getElementById('shotLowOrbit'),
  shotTopographic: document.getElementById('shotTopographic'),
  shotMacro: document.getElementById('shotMacro'),
  shotHorizonSweep: document.getElementById('shotHorizonSweep'),
};
const hudEls = {
  status: document.getElementById('cityHudStatus'),
};
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff); // pure white, no gradient/vignette

const CITY_CAMERA_STATE_KEY = 'city-camera-transform-v1';
const CITY_CAMERA_ANIMATION_STATE_KEY = 'city-camera-animation-v2';
const CITY_PARTICLE_STATE_KEY = 'city-particle-system-v2';
const CITY_DEBUG_PANEL_STATE_KEY = 'city-debug-panel-v1';
const CITY_BUILDING_HOVER_STATE_KEY = 'city-building-hover-v1';
const CITY_FADE_FAR_MIGRATION_KEY = 'city-fade-far-360-v1';
const DEFAULT_CAMERA_X = 360;
const DEFAULT_CAMERA_Y = 270;
const DEFAULT_CAMERA_Z = 480;
const DEFAULT_TARGET_X = 0;
const DEFAULT_TARGET_Y = 0;
const DEFAULT_TARGET_Z = 0;
const DEFAULT_CAMERA_FOV = 72;
const DEFAULT_CAMERA_ZOOM = 1;
const DEFAULT_CAMERA_NEAR = 1;
const DEFAULT_CAMERA_FAR = 8000;
const DEFAULT_FADE_NEAR = 8;
const DEFAULT_FADE_FAR = 360;
const DEFAULT_MAX_POLAR_DEG = 99;
const DEFAULT_PARTICLE_SCALE = 1;
const DEFAULT_PARTICLE_ALPHA = 1;
const DEFAULT_PARTICLE_DENSITY = 4;
const DEFAULT_PARTICLE_BUILDING_DENSITY = 1;
const DEFAULT_PARTICLE_RIVER_DENSITY = 1.3;
const DEFAULT_PARTICLE_STREET_DENSITY = 4;
const DEFAULT_PARTICLE_STREAM_DENSITY = 2.65;
const DEFAULT_PARTICLE_TRAFFIC_DENSITY = 4;
const DEFAULT_PARTICLE_WIND_DENSITY = 1;
const PARTICLE_DENSITY_MAX = 10;
const DEFAULT_PARTICLE_COLOR = '#a4a4aa';
const DEFAULT_PARTICLE_COLOR_MIX = 1;
const DEFAULT_PARTICLE_BLUR = 0.72;
const DEFAULT_PARTICLE_WOBBLE = 0.28;
const DEFAULT_TWINKLE_SPEED = 1.6;
const DEFAULT_TWINKLE_AMOUNT = 0.22;
const DEFAULT_STREAM_SPEED = 1;
const DEFAULT_TRAFFIC_SPEED = 1;
const DEFAULT_EMBER_SPEED = 1;
const DEFAULT_CAMERA_ANIMATION_DURATION = 4;

const camera = new THREE.PerspectiveCamera(
  DEFAULT_CAMERA_FOV,
  window.innerWidth / window.innerHeight,
  DEFAULT_CAMERA_NEAR,
  DEFAULT_CAMERA_FAR
);
camera.position.set(DEFAULT_CAMERA_X, DEFAULT_CAMERA_Y, DEFAULT_CAMERA_Z);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 30;
controls.maxDistance = 3500;
controls.maxPolarAngle = degToRad(DEFAULT_MAX_POLAR_DEG);
controls.target.set(DEFAULT_TARGET_X, DEFAULT_TARGET_Y, DEFAULT_TARGET_Z);

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function degToRad(deg) {
  return deg * Math.PI / 180;
}

function radToDeg(rad) {
  return rad * 180 / Math.PI;
}

function roundForDebug(value, digits = 2) {
  return Number(value.toFixed(digits));
}

function normalizeHexColor(value, fallback = DEFAULT_PARTICLE_COLOR) {
  if (typeof value !== 'string') return fallback;
  const trimmed = value.trim();
  if (/^#[0-9a-f]{6}$/i.test(trimmed)) return trimmed.toLowerCase();
  if (/^#[0-9a-f]{3}$/i.test(trimmed)) {
    return `#${trimmed[1]}${trimmed[1]}${trimmed[2]}${trimmed[2]}${trimmed[3]}${trimmed[3]}`.toLowerCase();
  }
  return fallback;
}

// ============================================================
// GLOBE — radius for spherical wrap (applied in vertex shader)
// Larger = subtler curve; smaller = more dramatic globe feel.
// ============================================================
const GLOBE_R = 1900;

// ---------- soft sprite texture ----------
function makeSpriteTexture() {
  // softer/wider gradient so every particle has its own glow halo;
  // when particles cluster the halos overlap into volumetric glow
  const s = 256;
  const c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0.00, 'rgba(255,255,255,1.00)');
  g.addColorStop(0.10, 'rgba(255,255,255,0.85)');
  g.addColorStop(0.28, 'rgba(255,255,255,0.42)');
  g.addColorStop(0.55, 'rgba(255,255,255,0.14)');
  g.addColorStop(0.80, 'rgba(255,255,255,0.04)');
  g.addColorStop(1.00, 'rgba(255,255,255,0.00)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const sprite = makeSpriteTexture();

// ---------- background — soft radial gradient (warm-white center → cool-grey horizon) ----------
function makeBackgroundTexture() {
  const s = 1024;
  const c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2 - 100, 40, s/2, s/2, s/1.4);
  g.addColorStop(0.00, '#ffffff');
  g.addColorStop(0.45, '#f5f5f8');
  g.addColorStop(0.80, '#e6e7ec');
  g.addColorStop(1.00, '#d8dae2');
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ---------- shared point shader ----------
const sharedUniforms = {
  uTime: { value: 0 },
  uMap: { value: sprite },
  uPixelRatio: { value: renderer.getPixelRatio() },
  uSphereR: { value: GLOBE_R },
  // INVERTED fade — only the very-close band fades; everything else stays sharp at any orbit distance
  uFadeNear: { value: DEFAULT_FADE_NEAR }, // closer than this = fully faded (basically inside a building)

function normalizeCameraState(state) {
  const defaults = defaultCameraState();
  const near = clamp(Number.isFinite(state.near) ? state.near : defaults.near, 0.01, 2000);
  const far = Math.max(near + 1, Math.min(Number.isFinite(state.far) ? state.far : defaults.far, 50000));
  const fadeNear = clamp(Number.isFinite(state.fadeNear) ? state.fadeNear : defaults.fadeNear, 0, 10000);
  const fadeFar = Math.max(fadeNear + 0.1, Math.min(Number.isFinite(state.fadeFar) ? state.fadeFar : defaults.fadeFar, 20000));
  const zoom = clamp(Number.isFinite(state.zoom) ? state.zoom : defaults.zoom, 0.1, 10);
  return {
    x: Number.isFinite(state.x) ? state.x : defaults.x,
    y: Number.isFinite(state.y) ? state.y : defaults.y,
    z: Number.isFinite(state.z) ? state.z : defaults.z,
    targetX: Number.isFinite(state.targetX) ? state.targetX : defaults.targetX,
    targetY: Number.isFinite(state.targetY) ? state.targetY : defaults.targetY,
    targetZ: Number.isFinite(state.targetZ) ? state.targetZ : defaults.targetZ,
    fov: clamp(Number.isFinite(state.fov) ? state.fov : defaults.fov, 20, 100),
    zoom,
    near,
    far,
    fadeNear,
    fadeFar,
    maxPolarDeg: clamp(Number.isFinite(state.maxPolarDeg) ? state.maxPolarDeg : defaults.maxPolarDeg, 1, 179),
  };
}

function readSavedCameraState() {
  try {
    const raw = localStorage.getItem(CITY_CAMERA_STATE_KEY);
    if (!raw) return defaultCameraState();
    const parsed = JSON.parse(raw);
    if (localStorage.getItem(CITY_FADE_FAR_MIGRATION_KEY) !== 'done') {
      parsed.fadeFar = DEFAULT_FADE_FAR;
      localStorage.setItem(CITY_CAMERA_STATE_KEY, JSON.stringify(parsed));
      localStorage.setItem(CITY_FADE_FAR_MIGRATION_KEY, 'done');
    }
    return normalizeCameraState(parsed);
  } catch (e) {
    return defaultCameraState();
  }
}

function applyCameraState(state, persist = true) {
  const next = normalizeCameraState(state);
  camera.position.set(next.x, next.y, next.z);
  camera.fov = next.fov;
  camera.zoom = next.zoom;
  camera.near = next.near;
  camera.far = next.far;
  camera.updateProjectionMatrix();
  sharedUniforms.uFadeNear.value = next.fadeNear;
  sharedUniforms.uFadeFar.value = next.fadeFar;
  controls.target.set(next.targetX, next.targetY, next.targetZ);
  controls.maxPolarAngle = degToRad(next.maxPolarDeg);
  controls.update();
  if (persist) saveCameraState();
  updateCameraDebug();
}

  const shot = CITY_CAMERA_SHOTS[name];

  stopCameraAnimation(false);
  activeCameraShotName = name;
  applyCameraState(shot, true);
  updateCameraAnimationDebug();
}

function easeInOutExpo(t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  return t < 0.5
    ? Math.pow(2, 20 * t - 10) / 2
    : (2 - Math.pow(2, -20 * t + 10)) / 2;
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function lerpCameraStates(a, b, t) {
  const from = normalizeCameraState(a);
  const to = normalizeCameraState(b);
  return {
    x: lerp(from.x, to.x, t),
    y: lerp(from.y, to.y, t),
    z: lerp(from.z, to.z, t),
    targetX: lerp(from.targetX, to.targetX, t),
    targetY: lerp(from.targetY, to.targetY, t),
    targetZ: lerp(from.targetZ, to.targetZ, t),
    fov: lerp(from.fov, to.fov, t),
    zoom: lerp(from.zoom, to.zoom, t),
    near: lerp(from.near, to.near, t),
    far: lerp(from.far, to.far, t),
    fadeNear: lerp(from.fadeNear, to.fadeNear, t),
    fadeFar: lerp(from.fadeFar, to.fadeFar, t),
    maxPolarDeg: lerp(from.maxPolarDeg, to.maxPolarDeg, t),
  };
}

function startCameraAnimation() {
  const next = normalizeCameraAnimationState(cameraAnimation);
  cameraAnimation.duration = next.duration;
  cameraAnimation.keyA = next.keyA;
  cameraAnimation.keyB = next.keyB;
  cameraAnimation.active = true;
  cameraAnimation.startedAt = performance.now();
  controls.enabled = false;
  applyCameraState(cameraAnimation.keyA, false);
  saveCameraAnimationState();
  updateCameraAnimationDebug();
}

function updateCameraAnimation(now) {
  if (!cameraAnimation.active) return;
  const durationMs = Math.max(100, cameraAnimation.duration * 1000);
  const t = clamp((now - cameraAnimation.startedAt) / durationMs, 0, 1);
  const eased = easeInOutExpo(t);
  applyCameraState(lerpCameraStates(cameraAnimation.keyA, cameraAnimation.keyB, eased), false);
  if (t >= 1) {
    cameraAnimation.active = false;
    controls.enabled = true;
    applyCameraState(cameraAnimation.keyB, true);
    updateCameraAnimationDebug();
  }
}

const vert = /* glsl */`
  attribute float aSize;
  attribute float aPhase;
  varying vec3 vColor;
  varying float vTwinkle;
  varying float vFade;
  varying float vBackface;
  varying float vDensitySeed;
  uniform float uTime;
  uniform float uPixelRatio;
  uniform float uSizeScale;
  uniform float uSphereR;
  uniform float uFadeNear;
  uniform float uFadeFar;
  uniform float uWobble;
  uniform float uPointScale;
  uniform float uTwinkleSpeed;
  uniform float uTwinkleAmount;

  // Wrap a flat (x, y, z) plane point onto a sphere of radius R.
  // The plane's origin sits on top of the sphere (north pole),
  // (x, z) become arc-lengths in two perpendicular directions,
  // y becomes radial elevation above the surface.
  vec3 wrapSphere(vec3 p) {
    float R = uSphereR;
    if (R < 1.0) return p;
    float ax = p.z / R;
    float az = -p.x / R;
    float cx = cos(ax), sx = sin(ax);
    vec3 d = vec3(0.0, cx, sx);
    float cz = cos(az), sz = sin(az);
    vec3 dir = vec3(d.x * cz - d.y * sz,
                    d.x * sz + d.y * cz,
                    d.z);
    return vec3(0.0, -R, 0.0) + dir * (R + p.y);
  }

  void main() {
    vColor = color;
    vDensitySeed = fract(sin(aPhase * 78.233 + aSize * 12.9898) * 43758.5453);
    float twinkleWave = 0.5 + 0.5 * sin(uTime * uTwinkleSpeed + aPhase * 3.3);
    vTwinkle = 1.0 - uTwinkleAmount + uTwinkleAmount * twinkleWave;
    // small per-particle wobble so dots breathe in place — flowy feel
    vec3 wob = vec3(
      sin(uTime * 0.7 + aPhase * 2.3),
      sin(uTime * 1.1 + aPhase * 1.7),
      cos(uTime * 0.8 + aPhase * 2.9)
    ) * uWobble;
    vec3 wp = wrapSphere(position + wob);
    // back-face cull: hide anything on the far hemisphere of the globe
    vec3 outN = normalize(wp - vec3(0.0, -uSphereR, 0.0));
    vec3 toCam = normalize(cameraPosition - wp);
    vBackface = dot(outN, toCam);
    vec4 mv = modelViewMatrix * vec4(wp, 1.0);
    gl_Position = projectionMatrix * mv;
    float dist = -mv.z;
    // INVERTED: 1.0 at the camera, 0.0 at uFadeFar — so the frag shader fades CLOSE particles
    vFade = clamp(1.0 - (dist - uFadeNear) / max(1.0, uFadeFar - uFadeNear), 0.0, 1.0);
    // close particles puff into soft bokeh-ish blobs while they fade out (DoF feel)
    float size = aSize * uSizeScale * uPointScale * 140.0 * uPixelRatio;
    float hazePuff = 1.0 + vFade * 1.6;
    gl_PointSize = max(1.5, (size / max(0.001, dist)) * hazePuff);
  }
`;
const frag = /* glsl */`
  varying vec3 vColor;
  varying float vTwinkle;
  varying float vFade;
  varying float vBackface;
  varying float vDensitySeed;
  uniform sampler2D uMap;
  uniform vec3 uBgColor;
  uniform float uPointAlpha;
  uniform float uPointDensity;
  uniform float uSystemDensity;
  uniform float uPoolMultiplier;
  uniform vec3 uPointColor;
  uniform float uPointColorMix;
  uniform float uPointBlur;
  void main() {
    if (vBackface < 0.0) discard; // hide back hemisphere of globe
    float density = max(0.0, uPointDensity * uSystemDensity);
    float visibleDensity = clamp(density / max(1.0, uPoolMultiplier), 0.0, 1.0);
    if (vDensitySeed > visibleDensity) discard;
    vec4 tex = texture2D(uMap, gl_PointCoord);
    float blurPower = mix(2.4, 0.45, clamp(uPointBlur, 0.0, 1.0));
    float pointAlpha = pow(tex.a, blurPower);
    if (pointAlpha < 0.01) discard;
    vec3 sourceColor = mix(vColor, uPointColor, clamp(uPointColorMix, 0.0, 1.0));
    vec3 col = mix(sourceColor * vTwinkle, uBgColor, vFade * 0.95);
    float densityBoost = 1.0 + min(max(0.0, density - 1.0), 12.0) * 0.035;
    float alpha = pointAlpha * (1.0 - vFade) * uPointAlpha * densityBoost;
    if (alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;
function makePointsMaterial(sizeScale = 1.0, densityUniform = particleDensityUniforms.buildings, poolMultiplier = 1) {
  return new THREE.ShaderMaterial({
    uniforms: { ...sharedUniforms, uSizeScale: { value: sizeScale }, uSystemDensity: densityUniform, uPoolMultiplier: { value: poolMultiplier } },
    vertexShader: vert, fragmentShader: frag,
    vertexColors: true, transparent: true, depthWrite: false,
    blending: THREE.NormalBlending,
  });
}
// keep time-uniform shared by reference
function linkTimeUniform(mat) {
  mat.uniforms.uTime = sharedUniforms.uTime;
  mat.uniforms.uMap = sharedUniforms.uMap;
  mat.uniforms.uPixelRatio = sharedUniforms.uPixelRatio;
  mat.uniforms.uWobble = sharedUniforms.uWobble;
  mat.uniforms.uPointScale = sharedUniforms.uPointScale;
  mat.uniforms.uPointAlpha = sharedUniforms.uPointAlpha;
  mat.uniforms.uPointDensity = sharedUniforms.uPointDensity;
  if (!mat.uniforms.uSystemDensity) mat.uniforms.uSystemDensity = particleDensityUniforms.buildings;
  if (!mat.uniforms.uPoolMultiplier) mat.uniforms.uPoolMultiplier = { value: 1 };
  mat.uniforms.uPointColor = sharedUniforms.uPointColor;
  mat.uniforms.uPointColorMix = sharedUniforms.uPointColorMix;
  mat.uniforms.uPointBlur = sharedUniforms.uPointBlur;
  mat.uniforms.uTwinkleSpeed = sharedUniforms.uTwinkleSpeed;
  mat.uniforms.uTwinkleAmount = sharedUniforms.uTwinkleAmount;
}

[out:json][timeout:120];
(
