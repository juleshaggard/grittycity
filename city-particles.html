const OSM_CACHE_DB = 'city-particles-cache';
const OSM_CACHE_STORE = 'osm';
const OSM_CACHE_KEY = `bangkok-osm-v2:${BBOX.south},${BBOX.west},${BBOX.north},${BBOX.east}`;
const OSM_CACHE_REFRESH_MS = 1000 * 60 * 60 * 24 * 14;
const OSM_CACHE_RETRY_MS = 1000 * 60 * 60 * 24;

function formatCacheAge(ms) {
  const hours = Math.max(0, Math.floor(ms / (1000 * 60 * 60)));
  if (hours < 1) return 'fresh';
  if (hours < 48) return `${hours}h old`;
  return `${Math.floor(hours / 24)}d old`;
}

function isValidOSMRecord(record) {
  return record && record.data && Array.isArray(record.data.elements);
}

function openOSMCacheDB() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) {
      reject(new Error('IndexedDB unavailable'));
      return;
    }
    const req = indexedDB.open(OSM_CACHE_DB, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(OSM_CACHE_STORE)) {
        db.createObjectStore(OSM_CACHE_STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IndexedDB open failed'));
  });
}

function requestAsPromise(req) {
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IndexedDB request failed'));
  });
}

function transactionDone(tx) {
  return new Promise((resolve, reject) => {
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error('IndexedDB transaction failed'));
    tx.onabort = () => reject(tx.error || new Error('IndexedDB transaction aborted'));
  });
}

function readLocalOSMCache() {
  try {
    const raw = localStorage.getItem(OSM_CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    console.warn('Unable to read local OSM cache:', e);
    return null;
  }
}

function writeLocalOSMCache(record) {
  try {
    localStorage.setItem(OSM_CACHE_KEY, JSON.stringify(record));
  } catch (e) {
    console.warn('Unable to write local OSM cache:', e);
  }
}

async function readOSMCache() {
  try {
    const db = await openOSMCacheDB();
    const tx = db.transaction(OSM_CACHE_STORE, 'readonly');
    const record = await requestAsPromise(tx.objectStore(OSM_CACHE_STORE).get(OSM_CACHE_KEY));
    db.close();
    return isValidOSMRecord(record) ? record : null;
  } catch (e) {
    const record = readLocalOSMCache();
    return isValidOSMRecord(record) ? record : null;
  }
}

async function writeOSMCache(data, savedAt = Date.now(), checkedAt = Date.now()) {
  const record = { key: OSM_CACHE_KEY, savedAt, checkedAt, data };
  try {
    const db = await openOSMCacheDB();
    const tx = db.transaction(OSM_CACHE_STORE, 'readwrite');
    tx.objectStore(OSM_CACHE_STORE).put(record);
    await transactionDone(tx);
    db.close();
  } catch (e) {
    writeLocalOSMCache(record);
  }
}

async function markOSMCacheChecked(record) {
  if (!isValidOSMRecord(record)) return;
  await writeOSMCache(record.data, record.savedAt || Date.now(), Date.now());
}

async function queryOverpass({ quiet = false } = {}) {
  for (let i = 0; i < OVERPASS_ENDPOINTS.length; i++) {
    const ep = OVERPASS_ENDPOINTS[i];
    if (!quiet) lblText.textContent = `Querying OSM (${i + 1}/${OVERPASS_ENDPOINTS.length})…`;
    try {
      const res = await fetch(ep, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(query),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      if (!quiet) lblText.textContent = 'Parsing response…';
      const data = await res.json();
      await writeOSMCache(data);
      return data;
    } catch (e) {
      console.warn('Overpass endpoint failed:', ep, e);
    }
  }
  throw new Error('All Overpass endpoints failed');
}

async function refreshOSMCache(record) {
  await markOSMCacheChecked(record);
  try {
    await queryOverpass({ quiet: true });
    console.info('OSM cache refreshed');
  } catch (e) {
    console.warn('Background OSM cache refresh failed:', e);
  }
}

async function fetchOverpass() {
  const cached = await readOSMCache();
  if (isValidOSMRecord(cached)) {
    const now = Date.now();
    const ageMs = Math.max(0, now - (cached.savedAt || now));
    const checkedAgeMs = Math.max(0, now - (cached.checkedAt || 0));
    lblText.textContent = `Loading cached OSM (${formatCacheAge(ageMs)})…`;

    if (ageMs > OSM_CACHE_REFRESH_MS && checkedAgeMs > OSM_CACHE_RETRY_MS) {
      refreshOSMCache(cached);
    }
    return cached.data;
  }

  return queryOverpass();
}

// ============================================================
// BUILD SCENE FROM OSM DATA
// ============================================================
let riverPath = []; // array of THREE.Vector2 in scene coords
let riverCurve = null;
// projectedBuildings is populated by projectBuildings, consumed by mesh/wireframe builders.
let roads = [];                // array of polylines [{x,z},...] from OSM highways

function buildFromOSM(data) {
  // -------- separate buildings + rivers + roads --------
  const buildings = [];     // { geom: [{lat,lon}...], tags }
  const riverWaysGeom = []; // [[{lat,lon}...], ...]
  const roadWays = [];      // raw highway way geometries

  for (const el of data.elements) {
    if (el.type !== 'way') continue;
    const tags = el.tags || {};
    if (tags.building && el.geometry && el.geometry.length >= 3) {
      buildings.push({ geom: el.geometry, tags });
    } else if (tags.waterway === 'river' && el.geometry && el.geometry.length > 1) {
      riverWaysGeom.push(el.geometry);
    } else if (tags.highway && el.geometry && el.geometry.length >= 2) {
      roadWays.push(el.geometry);
    }
  }

  // project roads to scene-space polylines once
  roads = roadWays.map(g => g.map(p => {
    const xy = project(p.lat, p.lon);
    return { x: xy.x, z: xy.y };
  }));

  lblText.textContent = `Placing ${buildings.length.toLocaleString()} buildings…`;

  // -------- river curve from longest contiguous river way --------
  // pick the longest river way as the spine (likely the Chao Phraya main channel)
  riverWaysGeom.sort((a, b) => b.length - a.length);
  if (riverWaysGeom.length) {
    const main = riverWaysGeom[0];
    riverPath = main.map(p => project(p.lat, p.lon));
  } else {
    // fallback: synthesise an S-curve
    riverPath = [
      new THREE.Vector2(-700,  500),
      new THREE.Vector2(-300,  300),
      new THREE.Vector2(-80,   120),
      new THREE.Vector2(  60,  -40),
      new THREE.Vector2( 220, -180),
      new THREE.Vector2( 540, -560),
    ];
  }
  // build a 3D curve at y=0
  const curvePts = riverPath.map(v => new THREE.Vector3(v.x, 0, v.y));
  riverCurve = new THREE.CatmullRomCurve3(curvePts, false, 'centripetal', 0.5);

  // -------- render ALL river ways as a low grey ribbon of points --------
  buildRiverPoints(riverWaysGeom);

  // -------- buildings → project geometry only (NO particles; wireframes carry the form) --------
  const osmProjected = projectBuildings(buildings);
  projectedBuildings = osmProjected;
  console.log('[city] buildings →', {
    osm: osmProjected.length,
    total: projectedBuildings.length,
  });
  lblText.textContent = `${osmProjected.length.toLocaleString()} map buildings`;
}

function wrapSpherePointCPU(x, y, z) {
  const R = GLOBE_R;
  if (R < 1) return [x, y, z];
  const ax = z / R;
  const az = -x / R;
  const cx = Math.cos(ax), sx = Math.sin(ax);
  const cz = Math.cos(az), sz = Math.sin(az);
  const dx = 0;
  const dy = cx;
  const dz = sx;
  const dirX = dx * cz - dy * sz;
  const dirY = dx * sz + dy * cz;
  const dirZ = dz;
  return [dirX * (R + y), -R + dirY * (R + y), dirZ * (R + y)];
}

function footprintArea(pts) {
  let area = 0;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i];
    const b = pts[(i + 1) % pts.length];
    area += a.x * b.z - b.x * a.z;
  }
  return area * 0.5;
}

function createBuildingRecord(B, shrink = 0.018) {
  if (!B || !B.pts || B.pts.length < 3) return null;

  const raw = [];
  for (const p of B.pts) {
    if (!p || !Number.isFinite(p.x) || !Number.isFinite(p.z)) continue;
    const prev = raw[raw.length - 1];
    if (prev && Math.hypot(prev.x - p.x, prev.z - p.z) < 0.001) continue;
    raw.push({ x: p.x, z: p.z });
  }
  if (raw.length > 2) {
    const first = raw[0];
    const last = raw[raw.length - 1];
    if (Math.hypot(first.x - last.x, first.z - last.z) < 0.001) raw.pop();
  }
  if (raw.length < 3 || Math.abs(footprintArea(raw)) < 0.01) return null;

  if (footprintArea(raw) < 0) raw.reverse();

  let cx = 0, cz = 0;
  for (const p of raw) {
    cx += p.x;
    cz += p.z;
  }
  cx /= raw.length;
  cz /= raw.length;

  const pts = raw.map(p => ({
    x: p.x + (cx - p.x) * shrink,
    z: p.z + (cz - p.z) * shrink,
  }));

  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  for (const p of pts) {
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.z < minZ) minZ = p.z;
    if (p.z > maxZ) maxZ = p.z;
  }
  if (maxX <= minX || maxZ <= minZ) return null;

  return {
    pts,
    cx,
    cz,
    minX,
    maxX,
    minZ,
    maxZ,
    h: Math.max(0.4, B.heightU),
    areaM2: B.areaM2 || 0,
    tags: B.tags || {},
  };
}

function pushVertex(positions, normals, x, y, z, nx, ny, nz) {
  positions.push(x, y, z);
  if (normals) normals.push(nx, ny, nz);
}

function pushTriangle(indices, faceMap, a, b, c, recordIndex = null) {
  indices.push(a, b, c);
  if (faceMap) faceMap.push(recordIndex);
}

function appendBuildingPrismMesh(positions, normals, indices, record) {
  const { pts, h } = record;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i];
    const b = pts[(i + 1) % pts.length];
    const dx = b.x - a.x;
    const dz = b.z - a.z;
    const len = Math.max(0.001, Math.hypot(dx, dz));
    const nx = dz / len;
    const nz = -dx / len;
    const base = positions.length / 3;
    pushVertex(positions, normals, a.x, 0, a.z, nx, 0, nz);
    pushVertex(positions, normals, b.x, 0, b.z, nx, 0, nz);
    pushVertex(positions, normals, b.x, h, b.z, nx, 0, nz);
    pushVertex(positions, normals, a.x, h, a.z, nx, 0, nz);
    pushTriangle(indices, null, base, base + 1, base + 2);
    pushTriangle(indices, null, base, base + 2, base + 3);
  }

  const topBase = positions.length / 3;
  for (const p of pts) pushVertex(positions, normals, p.x, h, p.z, 0, 1, 0);
  const shapePts = pts.map(p => new THREE.Vector2(p.x, p.z));
  let triangles = THREE.ShapeUtils.triangulateShape(shapePts, []);
  if (!triangles.length && pts.length >= 3) {
    triangles = [];
    for (let i = 1; i < pts.length - 1; i++) triangles.push([0, i, i + 1]);
  }
  for (const tri of triangles) {
    pushTriangle(indices, null, topBase + tri[0], topBase + tri[1], topBase + tri[2]);
  }
}

function appendBuildingHitPrismMesh(positions, indices, faceMap, record, recordIndex) {
  const { pts, h } = record;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i];
    const b = pts[(i + 1) % pts.length];
    const base = positions.length / 3;
    for (const p of [[a.x, 0, a.z], [b.x, 0, b.z], [b.x, h, b.z], [a.x, h, a.z]]) {
      const wp = wrapSpherePointCPU(p[0], p[1], p[2]);
      positions.push(wp[0], wp[1], wp[2]);
    }
    pushTriangle(indices, faceMap, base, base + 1, base + 2, recordIndex);
    pushTriangle(indices, faceMap, base, base + 2, base + 3, recordIndex);
  }

  const topBase = positions.length / 3;
  for (const p of pts) {
    const wp = wrapSpherePointCPU(p.x, h, p.z);
    positions.push(wp[0], wp[1], wp[2]);
  }
  const shapePts = pts.map(p => new THREE.Vector2(p.x, p.z));
  let triangles = THREE.ShapeUtils.triangulateShape(shapePts, []);
  if (!triangles.length && pts.length >= 3) {
    triangles = [];
    for (let i = 1; i < pts.length - 1; i++) triangles.push([0, i, i + 1]);
  }
  for (const tri of triangles) {
    pushTriangle(indices, faceMap, topBase + tri[0], topBase + tri[1], topBase + tri[2], recordIndex);
  }
}

function appendBuildingLinePositions(positions, record) {
  const { pts, h } = record;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i];
    const b = pts[(i + 1) % pts.length];
    positions.push(a.x, 0, a.z, b.x, 0, b.z);
    positions.push(a.x, h, a.z, b.x, h, b.z);
    positions.push(a.x, 0, a.z, a.x, h, a.z);
  }
}

function makeBuildingFillGeometry(record) {
  const positions = [];
  const normals = [];
  const indices = [];
  appendBuildingPrismMesh(positions, normals, indices, record);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));
  return geo;
}

function makeBuildingLineGeometry(record) {
  const positions = [];
  appendBuildingLinePositions(positions, record);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  return geo;
}

function buildingHoverCellKey(x, z) {
  return `${x},${z}`;
}

function addBuildingHoverCell(cellX, cellZ, index) {
  const key = buildingHoverCellKey(cellX, cellZ);
  let bucket = buildingHoverSpatialIndex.get(key);
  if (!bucket) {
    bucket = [];
    buildingHoverSpatialIndex.set(key, bucket);
  }
  bucket.push(index);
}

function buildBuildingHoverSpatialIndex() {
  buildingHoverSpatialIndex.clear();
  for (let index = 0; index < buildingHoverRecords.length; index++) {
    const bounds = buildingHoverRecords[index];
    const cx = (bounds.minX + bounds.maxX) * 0.5;
    const cz = (bounds.minZ + bounds.maxZ) * 0.5;
    bounds.hoverable = Math.hypot(cx, cz) <= BUILDING_HOVER_MAX_RADIUS;
    if (!bounds.hoverable) continue;

    const minCellX = Math.floor(bounds.minX / BUILDING_HOVER_CELL_SIZE);
    const maxCellX = Math.floor(bounds.maxX / BUILDING_HOVER_CELL_SIZE);
    const minCellZ = Math.floor(bounds.minZ / BUILDING_HOVER_CELL_SIZE);
    const maxCellZ = Math.floor(bounds.maxZ / BUILDING_HOVER_CELL_SIZE);
    for (let cellX = minCellX; cellX <= maxCellX; cellX++) {
      for (let cellZ = minCellZ; cellZ <= maxCellZ; cellZ++) {
        addBuildingHoverCell(cellX, cellZ, index);
      }
    }
  }
}

// projection-only pass: computes per-building {pts, heightU, areaM2, tags}
function projectBuildings(buildings) {
  const out = new Array(buildings.length);
  for (let i = 0; i < buildings.length; i++) {
    const b = buildings[i];
    const t = b.tags || {};

    // ---- height resolution ----
    let h = 0;
    if (t['height'])               h = parseFloat(t['height']);
    else if (t['building:height']) h = parseFloat(t['building:height']);
    else if (t['building:levels']) h = parseFloat(t['building:levels']) * 3.3;
    if (!Number.isFinite(h) || h <= 0) {
      const kind = (t['building'] || '').toLowerCase();
      if (kind === 'apartments' || kind === 'residential') h = 9 + Math.random() * 6;
      else if (kind === 'commercial' || kind === 'office' || kind === 'retail') h = 12 + Math.random() * 14;
      else if (kind === 'temple' || kind === 'cathedral' || kind === 'church' || kind === 'mosque') h = 14 + Math.random() * 6;
      else h = 4 + Math.random() * 4;
    }
    const heightU = h * SCENE_SCALE;

    // ---- project polygon to scene coords ----
    const g = b.geom;
    const pts = new Array(g.length);
    for (let j = 0; j < g.length; j++) {
      const p = project(g[j].lat, g[j].lon);
      pts[j] = { x: p.x, z: p.y };
    }

    // ---- approximate footprint area (m²) for downstream callers ----
    let area2 = 0;
    for (let j = 0, k = pts.length - 1; j < pts.length; k = j++) {
      area2 += (pts[k].x + pts[j].x) * (pts[k].z - pts[j].z);
    }
    const areaScene = Math.abs(area2) * 0.5;
    const areaM2 = areaScene / (SCENE_SCALE * SCENE_SCALE);

    out[i] = { pts, heightU, areaM2, tags: t };
  }
  return out;
}

// ---------- BUILDINGS → 3D wireframe-of-windows particle shells ----------
// Each building's footprint polygon is walked, and particles are placed along
// every edge at multiple vertical "floor" levels — so each building appears as
// a 3D shape made entirely of glowing window points.
function buildBuildingPoints(buildings) {
  // -------- pre-process: project polygons + compute heights + estimate counts --------
  const projected = new Array(buildings.length); // [{pts: [{x,z}], height, tags}]
  let total = 0;

  // tuning — balanced for "dense but not overwhelming"
  const FLOOR_H = 3.3 * SCENE_SCALE;       // scene-units per floor
  const PERIM_SPACING = 3.2 * SCENE_SCALE; // sample every ~3.2m along the wall
  const ROOF_DOT_AREA = 50;                // ~1 rooftop dot per N sq-meters
  const OUTWARD_OFFSET = 0.38;             // push particles outside the box surface

  for (let i = 0; i < buildings.length; i++) {
    const b = buildings[i];
    const t = b.tags;

    // ---- height resolution ----
    let h = 0;
    if (t['height'])               h = parseFloat(t['height']);
    else if (t['building:height']) h = parseFloat(t['building:height']);
    else if (t['building:levels']) h = parseFloat(t['building:levels']) * 3.3;
    if (!Number.isFinite(h) || h <= 0) {
      // sensible default by building kind
      const kind = (t['building'] || '').toLowerCase();
      if (kind === 'apartments' || kind === 'residential') h = 9 + Math.random() * 6;
      else if (kind === 'commercial' || kind === 'office' || kind === 'retail') h = 12 + Math.random() * 14;
      else if (kind === 'temple' || kind === 'cathedral' || kind === 'church' || kind === 'mosque') h = 14 + Math.random() * 6;
      else h = 4 + Math.random() * 4;
    }
    const heightU = h * SCENE_SCALE; // in scene units

    // ---- project polygon to scene coords ----
    const g = b.geom;
    const pts = new Array(g.length);
    for (let j = 0; j < g.length; j++) {
      const p = project(g[j].lat, g[j].lon);
      pts[j] = { x: p.x, z: p.y };
    }

    // ---- approx polygon area (shoelace) for roof dot count ----
    let area2 = 0;
    for (let j = 0, k = pts.length - 1; j < pts.length; k = j++) {
      area2 += (pts[k].x + pts[j].x) * (pts[k].z - pts[j].z);
    }
    const areaScene = Math.abs(area2) * 0.5;
    const areaM2 = areaScene / (SCENE_SCALE * SCENE_SCALE);

    // ---- perimeter sample count + floor count ----
    let perim = 0;
    for (let j = 1; j < pts.length; j++) {
      const dx = pts[j].x - pts[j-1].x, dz = pts[j].z - pts[j-1].z;
      perim += Math.hypot(dx, dz);
    }
    const perimSamples = Math.max(6, Math.min(110, Math.ceil(perim / PERIM_SPACING)));

    // floors actually rendered
    let floors;
    if (heightU < FLOOR_H * 1.5) floors = 1;
    else if (heightU < FLOOR_H * 4)  floors = 3;
    else if (heightU < FLOOR_H * 10) floors = Math.min(6, Math.floor(heightU / FLOOR_H / 1.5));
    else floors = Math.min(18, Math.floor(heightU / FLOOR_H / 1.3));

    // roof dots — visible on low buildings, sparse on towers
    let roofDots = 0;
    if (heightU < FLOOR_H * 4) {
      roofDots = Math.min(60, Math.floor(areaM2 / ROOF_DOT_AREA));
    } else if (heightU < FLOOR_H * 10) {
      roofDots = Math.min(20, Math.floor(areaM2 / (ROOF_DOT_AREA * 2.5)));
    } else {
      roofDots = Math.min(10, Math.floor(areaM2 / (ROOF_DOT_AREA * 6)));
    }

    const count = perimSamples * floors + roofDots;
    projected[i] = { pts, heightU, areaM2, perimSamples, floors, roofDots, tags: t };
    total += count;
  }

  lblText.textContent = `Generating ${total.toLocaleString()} window lights…`;

  // -------- allocate one big buffer for ALL buildings --------
  const positions = new Float32Array(total * 3);
  const colors    = new Float32Array(total * 3);
  const sizes     = new Float32Array(total);
  const phases    = new Float32Array(total);

  const tmp = new THREE.Color();
  let k = 0;

  // helper: point-in-polygon for roof-dot rejection
  function inside(x, z, poly) {
    let ins = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i].x, zi = poly[i].z, xj = poly[j].x, zj = poly[j].z;
      const hit = ((zi > z) !== (zj > z)) &&
        (x < (xj - xi) * (z - zi) / ((zj - zi) || 1e-9) + xi);
      if (hit) ins = !ins;
    }
    return ins;
  }

  for (let i = 0; i < projected.length; i++) {
    const B = projected[i];
    const { pts, heightU, perimSamples, floors, roofDots, tags } = B;
    const tall = heightU > 18 * SCENE_SCALE;
    const veryTall = heightU > 40 * SCENE_SCALE;
    const isLandmark = !!(tags.historic || tags.amenity === 'place_of_worship' ||
                          ['temple','cathedral','mosque','church'].includes(tags.building));

    // ---- walk the perimeter and place `perimSamples` points uniformly ----
    // build cumulative arc length, then sample at equal spacing
    const edges = pts.length - 1;
    const segLens = new Float32Array(edges);
    let totalLen = 0;
    for (let j = 0; j < edges; j++) {
      const dx = pts[j+1].x - pts[j].x, dz = pts[j+1].z - pts[j].z;
      const L = Math.hypot(dx, dz);
      segLens[j] = L;
      totalLen += L;
    }
    if (totalLen < 1e-4) {
      // degenerate; skip
      continue;
    }

    // polygon centroid — used to push perimeter samples OUTWARD along edge normals
    // so they sit on the outside of the dithered box, not occluded inside it
    let cx0 = 0, cz0 = 0;
    for (const p of pts) { cx0 += p.x; cz0 += p.z; }
    cx0 /= pts.length; cz0 /= pts.length;

    for (let s = 0; s < perimSamples; s++) {
      // distance along perimeter
      let d = (s / perimSamples) * totalLen;
      // find which edge
      let eIdx = 0;
      while (eIdx < edges - 1 && d > segLens[eIdx]) { d -= segLens[eIdx]; eIdx++; }
      const a = pts[eIdx], b = pts[eIdx + 1];
      const tt = segLens[eIdx] > 0 ? d / segLens[eIdx] : 0;
      let wx = a.x + (b.x - a.x) * tt;
      let wz = a.z + (b.z - a.z) * tt;

      // outward edge normal (perpendicular to edge, pointing away from centroid)
      const edx = b.x - a.x, edz = b.z - a.z;
      const elen = segLens[eIdx] || 1;
      let nx = edz / elen, nz = -edx / elen;
      const mx = (a.x + b.x) * 0.5 - cx0;
      const mz = (a.z + b.z) * 0.5 - cz0;
      if (mx * nx + mz * nz < 0) { nx = -nx; nz = -nz; }
      wx += nx * OUTWARD_OFFSET;
      wz += nz * OUTWARD_OFFSET;

      for (let f = 0; f < floors; f++) {
        const yFrac = floors === 1 ? 0.18 : f / (floors - 1);
        const y = 0.15 + yFrac * heightU;

        // every window is "lit" — no random skip (user wants dense particle clouds)

        // color — grey base with a strong yellow accent presence (~32% windows + all landmarks)
        const r = Math.random();
        if (isLandmark) {
          tmp.copy(yellow).lerp(yellowB, Math.random() * 0.5);
        } else if (r < 0.32) {
          tmp.copy(yellow).lerp(yellowB, Math.random() * 0.40);
        } else if (r < 0.62) {
          tmp.copy(greyA).lerp(greyB, Math.random() * 0.7);
        } else if (r < 0.86) {
          tmp.copy(greyA);
        } else {
          tmp.copy(greyA).lerp(greyC, Math.random() * 0.6);
        }

        // tighten brightness so colours stay strongly visible on white
        tmp.multiplyScalar(0.88 + Math.random() * 0.12);

        const ix = k * 3;
        positions[ix + 0] = wx + (Math.random() - 0.5) * 0.06;
        positions[ix + 1] = y + (Math.random() - 0.5) * 0.06;
        positions[ix + 2] = wz + (Math.random() - 0.5) * 0.06;
        colors[ix + 0] = tmp.r;
        colors[ix + 1] = tmp.g;
        colors[ix + 2] = tmp.b;
        sizes[k] = (tall ? 1.9 : 1.6) * (0.8 + Math.random() * 0.5);
        phases[k] = Math.random() * Math.PI * 2;
        k++;
      }
    }

    // ---- rooftop dots (street-lit roofs, AC units, low buildings) ----
    if (roofDots > 0) {
      // compute footprint bbox for sampling
      let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
      for (const p of pts) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.z < minZ) minZ = p.z;
        if (p.z > maxZ) maxZ = p.z;
      }
      let placed = 0, tries = 0;
      while (placed < roofDots && tries < roofDots * 12) {
        tries++;
        const rx = minX + Math.random() * (maxX - minX);
        const rz = minZ + Math.random() * (maxZ - minZ);
        if (!inside(rx, rz, pts)) continue;
        const y = heightU + 0.05 + Math.random() * 0.12;

        const r = Math.random();
        if (r < 0.018) tmp.copy(accentYellow).lerp(greyC, Math.random() * 0.18);
        else if (r < 0.30) tmp.copy(yellow).lerp(yellowB, Math.random() * 0.4);
        else tmp.copy(greyA).lerp(greyB, Math.random() * 0.6);
        tmp.multiplyScalar(0.85 + Math.random() * 0.15);

        const ix = k * 3;
        positions[ix + 0] = rx;
        positions[ix + 1] = y;
        positions[ix + 2] = rz;
        colors[ix + 0] = tmp.r; colors[ix + 1] = tmp.g; colors[ix + 2] = tmp.b;
        sizes[k] = 1.8 * (0.75 + Math.random() * 0.5);
        phases[k] = Math.random() * Math.PI * 2;
        k++;
        placed++;
      }
    }
  }

  // trim to actual filled count
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions.subarray(0, k * 3), 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors.subarray(0, k * 3), 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes.subarray(0, k), 1));
  geo.setAttribute('aPhase',   new THREE.BufferAttribute(phases.subarray(0, k), 1));
  const mat = makePointsMaterial(1.0, particleDensityUniforms.buildings);
  scene.add(new THREE.Points(geo, mat));

  lblText.textContent = `${k.toLocaleString()} window lights · ${buildings.length.toLocaleString()} buildings`;

  // expose for the footprint extrusion pass
  projectedBuildings = projected;

  // thicken the field with ambient street/alley particles around every building
  buildBuildingAmbient(buildings, projected);
}

// ---------- RIVER → faint dark blue point ribbon along all river ways ----------
function buildRiverPoints(riverWays) {
  if (!riverWays.length) return;
  const pts = [];
  for (const way of riverWays) {
    for (let i = 0; i < way.length - 1; i++) {
      const a = project(way[i].lat, way[i].lon);
      const b = project(way[i+1].lat, way[i+1].lon);
      const dx = b.x - a.x, dz = b.y - a.y;
      const len = Math.hypot(dx, dz);
      const steps = Math.max(2, Math.floor(len / (1.5 / RIVER_PARTICLE_POOL_MULTIPLIER)));
      const nx = -dz / (len || 1), nz = dx / (len || 1);
      for (let s = 0; s < steps; s++) {
        const t = s / steps;
        // jitter across width (~14 scene units = ~80m river width approx)
        const off = (Math.random() - 0.5) * 14;
        pts.push(a.x + dx * t + nx * off);
        pts.push(0.05);
        pts.push(a.y + dz * t + nz * off);
      }
    }
  }
  if (!pts.length) return;
  const positions = new Float32Array(pts);
  const N = positions.length / 3;
  const colors = new Float32Array(N * 3);
  const sizes  = new Float32Array(N);
  const phases = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    // light grey ribbon for the river — slightly darker than the building ambient
    const v = 0.55 + Math.random() * 0.12;
    colors[i*3+0] = v * greyB.r * 1.5;
    colors[i*3+1] = v * greyB.g * 1.5;
    colors[i*3+2] = v * greyB.b * 1.5;
    sizes[i] = 0.8 + Math.random() * 0.6;
    phases[i] = Math.random() * Math.PI * 2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aPhase',   new THREE.BufferAttribute(phases, 1));
  const mat = makePointsMaterial(0.8, particleDensityUniforms.river, RIVER_PARTICLE_POOL_MULTIPLIER);
  scene.add(new THREE.Points(geo, mat));
}

// ---------- BUILDING BOXES — merged 3D extrusions ----------
// One axis-aligned box per building, sized from the polygon's bounding box +
// its computed height. All boxes merge into a single BufferGeometry so the
// whole city renders in one draw call. Sphere-wrap and depth-fade live in
// the vertex shader so the boxes curve onto the globe just like the points.
const meshVert = /* glsl */`
  uniform float uSphereR;
  uniform float uFadeNear;
  uniform float uFadeFar;
  varying vec3 vNormalW;
  varying vec3 vWorldPos;
  varying vec3 vCullWorldPos;
  varying float vFade;

  void main() {
    vec3 wp;
    vec3 wn;
    vec3 cullWp;
    if (uSphereR < 1.0) {
      wp = position;
      wn = normal;
      cullWp = vec3(position.x, 0.0, position.z);
    } else {
      float R = uSphereR;
      float ax = position.z / R;
      float az = -position.x / R;
      float cx = cos(ax), sx = sin(ax);
      float cz = cos(az), sz = sin(az);
      mat3 Rx = mat3(
        1.0, 0.0, 0.0,
        0.0,  cx,  sx,
        0.0, -sx,  cx
      );
      mat3 Rz = mat3(
         cz, sz, 0.0,
        -sz, cz, 0.0,
        0.0, 0.0, 1.0
      );
      mat3 Rot = Rz * Rx;
      vec3 local = vec3(0.0, R + position.y, 0.0);
      wp = Rot * local + vec3(0.0, -R, 0.0);
      cullWp = Rot * vec3(0.0, R, 0.0) + vec3(0.0, -R, 0.0);
      wn = normalize(Rot * normal);
    }
    vNormalW = wn;
    vWorldPos = wp;
    vCullWorldPos = cullWp;
    vec4 mv = modelViewMatrix * vec4(wp, 1.0);
    gl_Position = projectionMatrix * mv;
    float dist = -mv.z;
    vFade = clamp((dist - uFadeNear) / max(1.0, uFadeFar - uFadeNear), 0.0, 1.0);
  }
`;
const meshFrag = /* glsl */`
  uniform vec3 uColor;
  uniform vec3 uBgColor;
  uniform float uTopBoost;
  uniform float uSideShade;
  uniform float uGrainScale;     // how fine the dot pattern is (units⁻¹)
  uniform float uDiscardBase;    // base fraction of pixels removed (0..1)
  uniform float uDiscardEdge;    // extra discard at glancing angles
  uniform float uSphereR;
  varying vec3 vNormalW;
  varying vec3 vWorldPos;
  varying vec3 vCullWorldPos;
  varying float vFade;

  // cheap 3d hash → [0,1)
  float hash13(vec3 p3) {
    p3 = fract(p3 * 0.1031);
    p3 += dot(p3, p3.zyx + 31.32);
    return fract((p3.x + p3.y) * p3.z);
  }

  void main() {
    // Cull by footprint, not vertex height. Otherwise tall towers get sliced
    // where their tops cross the curved-world horizon test before their bases.
    vec3 sphereOutN = normalize(vCullWorldPos - vec3(0.0, -uSphereR, 0.0));
    vec3 sphereToCam = normalize(cameraPosition - vCullWorldPos);
    if (dot(sphereOutN, sphereToCam) < -0.04) discard;

    // -------- particle dither: discard a fraction of pixels so the box
    //          surface reads as a cloud of dots, not a wall --------
    float grain = hash13(vWorldPos * uGrainScale);

    // glancing angles dissolve more (rims feel airy)
    vec3 viewDir = normalize(cameraPosition - vWorldPos);
    float facing = abs(dot(normalize(vNormalW), viewDir));
    float threshold = uDiscardBase + uDiscardEdge * (1.0 - facing);
    // distant buildings dissolve further — true horizon haze
    threshold += vFade * 0.30;

    if (grain < threshold) discard;

    // -------- shading on surviving pixels --------
    vec3 lightDir = normalize(vec3(0.4, 0.95, 0.5));
    float ndl = max(0.0, dot(vNormalW, lightDir));
    float topness = clamp(vNormalW.y, 0.0, 1.0);
    vec3 col = uColor * mix(uSideShade, uTopBoost, topness * 0.55 + ndl * 0.45);
    col *= 0.94 + 0.06 * vNormalW.x;
    col = mix(col, uBgColor, vFade * 0.55);

    gl_FragColor = vec4(col, 1.0);
  }
`;

const buildingHoverFrag = /* glsl */`
  uniform vec3 uColor;
  uniform vec3 uBgColor;
  uniform float uAlpha;
  uniform float uSphereR;
  varying vec3 vNormalW;
  varying vec3 vWorldPos;
  varying vec3 vCullWorldPos;
  varying float vFade;

  void main() {
    vec3 sphereOutN = normalize(vCullWorldPos - vec3(0.0, -uSphereR, 0.0));
    vec3 sphereToCam = normalize(cameraPosition - vCullWorldPos);
    if (dot(sphereOutN, sphereToCam) < -0.04) discard;

    vec3 lightDir = normalize(vec3(0.36, 0.92, 0.28));
    float ndl = max(0.0, dot(normalize(vNormalW), lightDir));
    float topness = clamp(vNormalW.y, 0.0, 1.0);
    vec3 col = uColor * (0.62 + 0.38 * (topness * 0.45 + ndl * 0.55));
    col = mix(col, uBgColor, vFade * 0.32);
    float alpha = uAlpha * (1.0 - vFade * 0.62);
    if (alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

function buildBuildingMeshes(projected) {
  if (!projected || !projected.length) return;
  const records = [];
  for (const B of projected) {
    const record = createBuildingRecord(B);
    if (record) records.push(record);
  }
  if (!records.length) return;

  lblText.textContent = `Extruding ${records.length.toLocaleString()} map footprints…`;
  disposeBuildingHitMesh();
  buildingHoverRecords.length = 0;

  const positions = [];
  const normals = [];
  const indices = [];

  for (const record of records) {
    buildingHoverRecords.push(record);
    appendBuildingPrismMesh(positions, normals, indices, record);
  }
  buildBuildingHoverSpatialIndex();
  updateBuildingHoverDebug();

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));

  // Depth-only occluder pass: invisible, but writes depth so the wireframes
  // behind a building (including each building's own back edges) get hidden.
  // DoubleSide rendering ensures every footprint prism pixel has a depth value.
  const occluderVert = `
    uniform float uSphereR;
    void main() {
      vec3 wp;
      if (uSphereR < 1.0) {
        wp = position;
      } else {
        float R = uSphereR;
        float ax = position.z / R;
        float az = -position.x / R;
        float cx = cos(ax), sx = sin(ax);
        float cz = cos(az), sz = sin(az);
        mat3 Rx = mat3(1.0, 0.0, 0.0,  0.0, cx, sx,  0.0, -sx, cx);
        mat3 Rz = mat3(cz, sz, 0.0,  -sz, cz, 0.0,  0.0, 0.0, 1.0);
        mat3 Rot = Rz * Rx;
        wp = Rot * vec3(0.0, R + position.y, 0.0) + vec3(0.0, -R, 0.0);
      }
      gl_Position = projectionMatrix * modelViewMatrix * vec4(wp, 1.0);
    }
  `;
  const occluderFrag = `void main() { gl_FragColor = vec4(0.0); }`;

  const mat = new THREE.ShaderMaterial({
    uniforms: { uSphereR: sharedUniforms.uSphereR },
    vertexShader: occluderVert,
    fragmentShader: occluderFrag,
    side: THREE.DoubleSide,
    colorWrite: false,
    depthWrite: true,
    depthTest: true,
    polygonOffset: true,
    polygonOffsetFactor: 1,
    polygonOffsetUnits: 1,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = -1; // draw before wireframes/particles so depth is populated
  scene.add(mesh);
}

// ---------- BUILDING WIREFRAMES — thin grey outlines from actual OSM footprints ----------
const wireVert = /* glsl */`
  uniform float uSphereR;
  uniform float uFadeNear;
  uniform float uFadeFar;
  varying float vFade;
  varying float vBackface;
  varying float vDepthLayer;

  void main() {
    vec3 wp;
    vec3 cullWp;
    if (uSphereR < 1.0) {
      wp = position;
      cullWp = vec3(position.x, 0.0, position.z);
    } else {
      float R = uSphereR;
      float ax = position.z / R;
      float az = -position.x / R;
      float cx = cos(ax), sx = sin(ax);
      float cz = cos(az), sz = sin(az);
      mat3 Rx = mat3(1.0, 0.0, 0.0,  0.0, cx, sx,  0.0, -sx, cx);
      mat3 Rz = mat3(cz, sz, 0.0,  -sz, cz, 0.0,  0.0, 0.0, 1.0);
      mat3 Rot = Rz * Rx;
      vec3 local = vec3(0.0, R + position.y, 0.0);
      wp = Rot * local + vec3(0.0, -R, 0.0);
      cullWp = Rot * vec3(0.0, R, 0.0) + vec3(0.0, -R, 0.0);
    }
    vec3 outN = normalize(cullWp - vec3(0.0, -uSphereR, 0.0));
    vec3 toCam = normalize(cameraPosition - cullWp);
    vBackface = dot(outN, toCam);

    vec4 mv = modelViewMatrix * vec4(wp, 1.0);
    gl_Position = projectionMatrix * mv;
    float dist = -mv.z;
    vFade = clamp(1.0 - (dist - uFadeNear) / max(1.0, uFadeFar - uFadeNear), 0.0, 1.0);
    vDepthLayer = smoothstep(uFadeFar * 0.85, uFadeFar * 3.35, dist);
  }
`;
const wireFrag = /* glsl */`
  uniform vec3 uColor;
  uniform vec3 uBgColor;
  uniform float uAlpha;
  varying float vFade;
  varying float vBackface;
  varying float vDepthLayer;

  void main() {
    if (vBackface < -0.04) discard;
    vec3 col = mix(uColor, uBgColor, clamp(vFade * 0.70 + vDepthLayer * 0.70, 0.0, 1.0));
    float closeAlpha = 1.0 - vFade * 0.95;
    float depthAlpha = mix(1.08, 0.065, smoothstep(0.0, 1.0, vDepthLayer));
    float alpha = uAlpha * closeAlpha * depthAlpha;
    if (alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

function buildBuildingWireframes(projected) {
  if (!projected || !projected.length) return;
  const records = buildingHoverRecords.length
    ? buildingHoverRecords
    : projected.map(B => createBuildingRecord(B)).filter(Boolean);
  if (!records.length) return;

  const positions = [];
  for (const record of records) {
    appendBuildingLinePositions(positions, record);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR:  sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar:  sharedUniforms.uFadeFar,
      uBgColor:  sharedUniforms.uBgColor,
      uColor:    { value: new THREE.Color('#a4a4aa') }, // light-mid grey wireframe
      uAlpha:    { value: 0.55 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
  });

  scene.add(new THREE.LineSegments(geo, mat));
}

// ---------- AMBIENT STREET / ALLEY PARTICLES around buildings ----------
// Sprays warm, dim points in the immediate vicinity of every building so the
// gaps between footprints read as glowing streets / alleys / forecourts —
// not empty black. This thickens the overall light density without burying
// the building wireframes.
function buildBuildingAmbient(buildings, projected) {
  // budget proportional to building count, but capped
  const N = Math.min(520000, Math.max(90000, buildings.length * 3 * STREET_PARTICLE_POOL_MULTIPLIER));
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const sz  = new Float32Array(N);
  const ph  = new Float32Array(N);
  const tmp = new THREE.Color();

  for (let i = 0; i < N; i++) {
    // pick a random building, weight slightly toward larger ones via area
    const B = projected[Math.floor(Math.random() * projected.length)];
    if (!B || !B.pts.length) { i--; continue; }
    // pick a random vertex from polygon as anchor
    const v = B.pts[Math.floor(Math.random() * B.pts.length)];

    // spray in an annulus around the building edge (mostly outside)
    const r = 1.2 + Math.random() * Math.random() * 9; // bias close to wall
    const a = Math.random() * Math.PI * 2;
    const x = v.x + Math.cos(a) * r;
    const z = v.z + Math.sin(a) * r;

    // mostly street level, occasional low rooftop spillover
    const y = Math.random() < 0.94
      ? 0.1 + Math.random() * 0.5
      : 0.1 + Math.random() * Math.min(B.heightU * 0.4, 6);

    // grey ambience with frequent warm yellow lamp-spill
    const rr = Math.random();
    if (rr < 0.015) tmp.copy(accentYellow).lerp(greyC, Math.random() * 0.25);
    else if (rr < 0.28) tmp.copy(yellow).lerp(yellowB, Math.random() * 0.45);
    else if (rr < 0.66) tmp.copy(greyA).lerp(greyC, Math.random() * 0.6);
    else tmp.copy(greyA).lerp(greyB, Math.random() * 0.7);

    const distFromCenter = Math.hypot(x, z);
    const dim = Math.max(0.7, 1 - distFromCenter / 2800);
    tmp.multiplyScalar(dim);

    const ix = i * 3;
    pos[ix + 0] = x;
    pos[ix + 1] = y;
    pos[ix + 2] = z;
    col[ix + 0] = tmp.r; col[ix + 1] = tmp.g; col[ix + 2] = tmp.b;
    sz[i] = 0.9 + Math.random() * 0.9;
    ph[i] = Math.random() * Math.PI * 2;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sz, 1));
  geo.setAttribute('aPhase',   new THREE.BufferAttribute(ph, 1));
  scene.add(new THREE.Points(geo, makePointsMaterial(0.9, particleDensityUniforms.streets, STREET_PARTICLE_POOL_MULTIPLIER)));
}

// ---------- TRAFFIC STREAMS along the river ----------
let streamGeo, sT, sSpeed, sSide, sOff;
const STREAM_COUNT = 2600 * STREAM_PARTICLE_POOL_MULTIPLIER;

function buildStreams() {
  if (!riverCurve) return;
  streamGeo = new THREE.BufferGeometry();
  const pos  = new Float32Array(STREAM_COUNT * 3);
  const col  = new Float32Array(STREAM_COUNT * 3);
  const size = new Float32Array(STREAM_COUNT);
  const ph   = new Float32Array(STREAM_COUNT);
  sT = new Float32Array(STREAM_COUNT);
  sSpeed = new Float32Array(STREAM_COUNT);
  sSide  = new Float32Array(STREAM_COUNT);
  sOff   = new Float32Array(STREAM_COUNT);

  for (let i = 0; i < STREAM_COUNT; i++) {
    sT[i] = Math.random();
    sSpeed[i] = 0.010 + Math.random() * 0.024;
    const side = Math.random() < 0.5 ? -1 : 1;
    sSide[i] = side;
    sOff[i] = (16 + Math.random() * 16) * side; // ~lanes ~80–180m off the river
    size[i] = 1.4 + Math.random() * 1.8;
    // yellow flow one direction, grey flow the other
    const c = side > 0
      ? (Math.random() < 0.11
        ? accentYellow.clone().lerp(greyC, Math.random() * 0.18)
        : yellow.clone().lerp(yellowB, Math.random() * 0.4))
      : greyB.clone().lerp(greyA, Math.random() * 0.5);
    col[i*3+0] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
    ph[i] = Math.random() * 6.28;
  }
  streamGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  streamGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  streamGeo.setAttribute('aSize',    new THREE.BufferAttribute(size, 1));
  streamGeo.setAttribute('aPhase',   new THREE.BufferAttribute(ph, 1));
  const mat = makePointsMaterial(1.0, particleDensityUniforms.streams, STREAM_PARTICLE_POOL_MULTIPLIER);
  scene.add(new THREE.Points(streamGeo, mat));
}

// ---------- TRAFFIC — particles flowing along OSM streets like cars ----------
let trafficGeo = null;
let trafficData = null;            // per-particle: {roadIdx, segIdx, t, dir, speed}
let trafficRoadLens = null;        // per-road: cumulative segment lengths for fast advance
const TRAFFIC_COUNT = 6000 * TRAFFIC_PARTICLE_POOL_MULTIPLIER;

function buildTraffic() {
  if (!roads.length) return;

  // pre-compute per-road segment lengths + total length for weighted seeding
  trafficRoadLens = roads.map(r => {
    const lens = new Float32Array(Math.max(0, r.length - 1));
    let total = 0;
    for (let i = 1; i < r.length; i++) {
      const L = Math.hypot(r[i].x - r[i-1].x, r[i].z - r[i-1].z);
      lens[i-1] = L;
      total += L;
    }
    return { lens, total };
  });
  const grandTotal = trafficRoadLens.reduce((s, r) => s + r.total, 0);
  if (grandTotal < 1) return;

  trafficGeo = new THREE.BufferGeometry();
  const pos = new Float32Array(TRAFFIC_COUNT * 3);
  const col = new Float32Array(TRAFFIC_COUNT * 3);
  const sz  = new Float32Array(TRAFFIC_COUNT);
  const ph  = new Float32Array(TRAFFIC_COUNT);
  trafficData = new Array(TRAFFIC_COUNT);

  for (let i = 0; i < TRAFFIC_COUNT; i++) {
    // pick a road weighted by length so longer roads get proportionally more particles
    let pick = Math.random() * grandTotal;
    let roadIdx = 0;
    while (roadIdx < roads.length - 1 && pick > trafficRoadLens[roadIdx].total) {
      pick -= trafficRoadLens[roadIdx].total;
      roadIdx++;
    }
    const road = roads[roadIdx];
    const meta = trafficRoadLens[roadIdx];
    if (!road || road.length < 2 || meta.total < 1) { i--; continue; }

    // pick a segment weighted by its length
    let segPick = Math.random() * meta.total;
    let segIdx = 0;
    while (segIdx < meta.lens.length - 1 && segPick > meta.lens[segIdx]) {
      segPick -= meta.lens[segIdx];
      segIdx++;
    }
    const t = Math.random();
    const dir = Math.random() < 0.5 ? 1 : -1;
    const speed = 6 + Math.random() * 9; // scene-units per second

    trafficData[i] = { roadIdx, segIdx, t, dir, speed };

    const a = road[segIdx], b = road[segIdx + 1];
    pos[i*3+0] = a.x + (b.x - a.x) * t;
    pos[i*3+1] = 0.5 + Math.random() * 0.4;
    pos[i*3+2] = a.z + (b.z - a.z) * t;

    // mostly mid grey, some light grey accents — distinguishes from buildings
    const c = Math.random() < 0.035
      ? accentYellow.clone().lerp(greyC, Math.random() * 0.22)
      : Math.random() < 0.55
        ? greyA.clone().lerp(greyB, Math.random() * 0.5)
        : greyA.clone().lerp(greyC, Math.random() * 0.5);
    col[i*3+0] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
    sz[i] = 1.2 + Math.random() * 0.9;
    ph[i] = Math.random() * 6.28;
  }

  trafficGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  trafficGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  trafficGeo.setAttribute('aSize',    new THREE.BufferAttribute(sz, 1));
  trafficGeo.setAttribute('aPhase',   new THREE.BufferAttribute(ph, 1));
  scene.add(new THREE.Points(trafficGeo, makePointsMaterial(0.95, particleDensityUniforms.traffic, TRAFFIC_PARTICLE_POOL_MULTIPLIER)));
}

function updateTraffic(dt) {
  if (!trafficGeo || !roads.length) return;
  const arr = trafficGeo.attributes.position.array;
  for (let i = 0; i < TRAFFIC_COUNT; i++) {
    const d = trafficData[i];
    if (!d) continue;
    const road = roads[d.roadIdx];
    const meta = trafficRoadLens[d.roadIdx];

    // advance along the current segment
    const segLen = meta.lens[d.segIdx] || 1;
    d.t += (d.dir * d.speed * dt * particleSettings.trafficSpeed) / segLen;

    // hop across segments if we overflow; reverse at the road endpoints
    let safety = 8;
    while ((d.t > 1 || d.t < 0) && safety-- > 0) {
      if (d.t > 1) {
        const next = d.segIdx + 1;
        if (next >= meta.lens.length) {
          d.dir = -1;
          d.t = 2 - d.t; // bounce
        } else {
          d.t = (d.t - 1) * segLen / (meta.lens[next] || 1);
          d.segIdx = next;
        }
      } else {
        const prev = d.segIdx - 1;
        if (prev < 0) {
          d.dir = 1;
          d.t = -d.t; // bounce
        } else {
          d.t = 1 + d.t * segLen / (meta.lens[prev] || 1);
          d.segIdx = prev;
        }
      }
    }
    d.t = Math.max(0, Math.min(1, d.t));

    const a = road[d.segIdx], b = road[d.segIdx + 1];
    arr[i*3+0] = a.x + (b.x - a.x) * d.t;
    arr[i*3+2] = a.z + (b.z - a.z) * d.t;
    // y stays as initialized (street level)
  }
  trafficGeo.attributes.position.needsUpdate = true;
}

// ---------- FLOW FIELD — curl-noise-driven particle wind through the city ----------
let eGeo;
const EMBER_COUNT = 14000 * WIND_PARTICLE_POOL_MULTIPLIER;
const FLOW_BOUND = 2600;  // spread the curl-noise flow across the whole visible dome

function buildEmbers() {
  eGeo = new THREE.BufferGeometry();
  const pos = new Float32Array(EMBER_COUNT * 3);
  const col = new Float32Array(EMBER_COUNT * 3);
  const sz  = new Float32Array(EMBER_COUNT);
  const ph  = new Float32Array(EMBER_COUNT);
  for (let i = 0; i < EMBER_COUNT; i++) {
    pos[i*3+0] = (Math.random() * 2 - 1) * FLOW_BOUND;
    // most particles sit at street/building level so they look like wind THROUGH the city,
    // some drift higher to give vertical depth
    pos[i*3+1] = Math.random() < 0.7
      ? 1 + Math.random() * 35
      : 30 + Math.random() * 220;
    pos[i*3+2] = (Math.random() * 2 - 1) * FLOW_BOUND;
    // grey with strong yellow accent streaks to read as warm flow
    const c = Math.random() < 0.025
      ? accentYellow.clone().lerp(greyC, Math.random() * 0.2)
      : Math.random() < 0.35
        ? yellow.clone().lerp(yellowB, Math.random() * 0.45)
        : greyA.clone().lerp(greyB, Math.random() * 0.55);
    col[i*3+0] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
    sz[i] = 1.2 + Math.random() * 1.3;
    ph[i] = Math.random() * 6.28;
  }
  eGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  eGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  eGeo.setAttribute('aSize',    new THREE.BufferAttribute(sz, 1));
  eGeo.setAttribute('aPhase',   new THREE.BufferAttribute(ph, 1));
  const mat = makePointsMaterial(0.95, particleDensityUniforms.wind, WIND_PARTICLE_POOL_MULTIPLIER);
  scene.add(new THREE.Points(eGeo, mat));
}

// ============================================================
// RENDERING — direct render, no post effects
// ============================================================
const composer = {
  render: () => renderer.render(scene, camera),
  setSize: (w, h) => renderer.setSize(w, h),
};

const buildingHoverRaycaster = new THREE.Raycaster();
const buildingHoverPointer = new THREE.Vector2();
const buildingHoverFlatPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const buildingHoverSphere = new THREE.Sphere(new THREE.Vector3(0, -GLOBE_R, 0), GLOBE_R);
const buildingHoverHitPoint = new THREE.Vector3();

function disposeBuildingHitMesh() {
  buildingHitFaceMap = [];
  if (!buildingHitMesh) return;
  if (buildingHitMesh.geometry) buildingHitMesh.geometry.dispose();
  if (buildingHitMesh.material) buildingHitMesh.material.dispose();
  buildingHitMesh = null;
}

function disposeBuildingHighlight(highlight) {
  highlight.group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
  });
}

function clearBuildingHighlights() {
  for (const highlight of buildingHighlights.values()) {
    scene.remove(highlight.group);
    disposeBuildingHighlight(highlight);
  }
  buildingHighlights.clear();
}

function setBuildingHoverEnabled(enabled, persist = true) {
  buildingHoverEnabled = Boolean(enabled);
  if (!buildingHoverEnabled) {
    clearBuildingHover();
    clearBuildingHighlights();
    disposeBuildingHitMesh();
  }
  if (persist) saveBuildingHoverEnabled();
  updateBuildingHoverDebug();
}

function createBuildingHighlight(index) {
  const bounds = buildingHoverRecords[index];
  if (!bounds) return null;

  const group = new THREE.Group();
  group.name = `building-hover-${index}`;

  const fillMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: BUILDING_HOVER_COLOR },
      uAlpha: { value: 0 },
    },
    vertexShader: meshVert,
    fragmentShader: buildingHoverFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
    side: THREE.DoubleSide,
    polygonOffset: true,
    polygonOffsetFactor: -2,
    polygonOffsetUnits: -2,
  });
  const fillMesh = new THREE.Mesh(makeBuildingFillGeometry(bounds), fillMat);
  fillMesh.renderOrder = 2;
  group.add(fillMesh);

  const lineMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: BUILDING_HOVER_COLOR },
      uAlpha: { value: 0 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  const lineMesh = new THREE.LineSegments(makeBuildingLineGeometry(bounds), lineMat);
  lineMesh.renderOrder = 3;
  group.add(lineMesh);

  scene.add(group);
  return {
    group,
    fillMat,
    lineMat,
    lastTouched: performance.now() / 1000,
  };
}

function touchBuildingHighlight(index) {
  if (index === null || !buildingHoverRecords[index]) return;
  let highlight = buildingHighlights.get(index);
  if (!highlight) {
    highlight = createBuildingHighlight(index);
    if (!highlight) return;
    buildingHighlights.set(index, highlight);
  }
  highlight.lastTouched = performance.now() / 1000;
}

function unwrapSpherePointCPU(point) {
  const R = GLOBE_R;
  if (R < 1) return { x: point.x, z: point.z };
  const dx = point.x;
  const dy = point.y + R;
  const dz = point.z;
  const len = Math.max(0.0001, Math.hypot(dx, dy, dz));
  const dirX = dx / len;
  const dirY = dy / len;
  const dirZ = dz / len;
  return {
    x: -Math.atan2(-dirX, dirY) * R,
    z: Math.asin(clamp(dirZ, -1, 1)) * R,
  };
}

function flatPointFromPointer(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  const x = (event.clientX - rect.left) / rect.width;
  const y = (event.clientY - rect.top) / rect.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return null;

  buildingHoverPointer.set(x * 2 - 1, -(y * 2 - 1));
  buildingHoverRaycaster.setFromCamera(buildingHoverPointer, camera);
  if (GLOBE_R < 1) {
    return buildingHoverRaycaster.ray.intersectPlane(buildingHoverFlatPlane, buildingHoverHitPoint)
      ? { x: buildingHoverHitPoint.x, z: buildingHoverHitPoint.z }
      : null;
  }

  return buildingHoverRaycaster.ray.intersectSphere(buildingHoverSphere, buildingHoverHitPoint)
    ? unwrapSpherePointCPU(buildingHoverHitPoint)
    : null;
}

function distanceToBuildingBoundsSq(point, bounds) {
  const dx = point.x < bounds.minX
    ? bounds.minX - point.x
    : point.x > bounds.maxX
      ? point.x - bounds.maxX
      : 0;
  const dz = point.z < bounds.minZ
    ? bounds.minZ - point.z
    : point.z > bounds.maxZ
      ? point.z - bounds.maxZ
      : 0;
  return dx * dx + dz * dz;
}

function getBuildingHoverCandidates(point) {
  if (!buildingHoverSpatialIndex.size) return [];

  const cellX = Math.floor(point.x / BUILDING_HOVER_CELL_SIZE);
  const cellZ = Math.floor(point.z / BUILDING_HOVER_CELL_SIZE);
  const found = new Set();
  const ranked = [];
  const maxDistanceSq = BUILDING_HOVER_SEARCH_RADIUS * BUILDING_HOVER_SEARCH_RADIUS;

  for (let dz = -BUILDING_HOVER_SEARCH_CELLS; dz <= BUILDING_HOVER_SEARCH_CELLS; dz++) {
    for (let dx = -BUILDING_HOVER_SEARCH_CELLS; dx <= BUILDING_HOVER_SEARCH_CELLS; dx++) {
      const bucket = buildingHoverSpatialIndex.get(buildingHoverCellKey(cellX + dx, cellZ + dz));
      if (!bucket) continue;
      for (const index of bucket) {
        if (found.has(index)) continue;
        found.add(index);
        const bounds = buildingHoverRecords[index];
        if (!bounds || !bounds.hoverable) continue;
        const distanceSq = distanceToBuildingBoundsSq(point, bounds);
        if (distanceSq > maxDistanceSq) continue;
        ranked.push({ index, distanceSq });
      }
    }
  }

  ranked.sort((a, b) => a.distanceSq - b.distanceSq);
  return ranked.slice(0, BUILDING_HOVER_MAX_CANDIDATES).map(item => item.index);
}

function buildBuildingHoverHitMesh(candidateIndices) {
  disposeBuildingHitMesh();
  if (!candidateIndices.length) return null;

  const positions = [];
  const indices = [];
  const faceMap = [];

  for (const index of candidateIndices) {
    const record = buildingHoverRecords[index];
    if (!record) continue;
    appendBuildingHitPrismMesh(positions, indices, faceMap, record, index);
  }

  if (!positions.length || !indices.length) return null;
  buildingHitFaceMap = faceMap;

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(new THREE.BufferAttribute(new Uint32Array(indices), 1));
  geo.computeBoundingSphere();

  const mat = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide });
  buildingHitMesh = new THREE.Mesh(geo, mat);
  buildingHitMesh.frustumCulled = false;
  buildingHitMesh.updateMatrixWorld(true);
  return buildingHitMesh;
}

function pickBuildingFromPointer(event) {
  if (!buildingHoverEnabled || controlsInteracting || cameraAnimation.active) return null;
  const flatPoint = flatPointFromPointer(event);
  if (!flatPoint) return null;

  const candidates = getBuildingHoverCandidates(flatPoint);
  if (!candidates.length) return null;

  const hitMesh = buildBuildingHoverHitMesh(candidates);
  if (!hitMesh) return null;

  const hits = buildingHoverRaycaster.intersectObject(hitMesh, false);
  if (!hits.length || hits[0].faceIndex === undefined) return null;
  const index = buildingHitFaceMap[hits[0].faceIndex];
  return buildingHoverRecords[index] ? index : null;
}

function updateBuildingHoverFromPointer() {
  buildingHoverRaf = 0;
  buildingHoverLastPickAt = performance.now();
  if (!pendingBuildingHoverEvent) return;
  if (!buildingHoverEnabled || controlsInteracting || cameraAnimation.active) {
    clearBuildingHover();
    return;
  }
  const next = pickBuildingFromPointer(pendingBuildingHoverEvent);
  hoveredBuildingIndex = next;
  if (next !== null) touchBuildingHighlight(next);
}

function scheduleBuildingHoverPick() {
  if (buildingHoverRaf || buildingHoverTimer) return;
  const now = performance.now();
  const wait = Math.max(0, BUILDING_HOVER_THROTTLE_MS - (now - buildingHoverLastPickAt));

  if (wait > 0) {
    buildingHoverTimer = window.setTimeout(() => {
      buildingHoverTimer = 0;
      buildingHoverRaf = requestAnimationFrame(updateBuildingHoverFromPointer);
    }, wait);
    return;
  }

  buildingHoverRaf = requestAnimationFrame(updateBuildingHoverFromPointer);
}

function queueBuildingHover(event) {
  if (!buildingHoverEnabled || controlsInteracting || cameraAnimation.active) {
    clearBuildingHover();
    return;
  }
  pendingBuildingHoverEvent = { clientX: event.clientX, clientY: event.clientY };
  scheduleBuildingHoverPick();
}

function clearBuildingHover() {
  if (buildingHoverRaf) {
    cancelAnimationFrame(buildingHoverRaf);
    buildingHoverRaf = 0;
  }
  if (buildingHoverTimer) {
    clearTimeout(buildingHoverTimer);
    buildingHoverTimer = 0;
  }
  hoveredBuildingIndex = null;
  pendingBuildingHoverEvent = null;
  disposeBuildingHitMesh();
}

function updateBuildingHighlights(now) {
  for (const [index, highlight] of buildingHighlights) {
    if (index === hoveredBuildingIndex) highlight.lastTouched = now;
    const t = Math.min(1, Math.max(0, (now - highlight.lastTouched) / BUILDING_HOVER_FADE_SECONDS));
    const fade = index === hoveredBuildingIndex ? 1 : 1 - t;
    const eased = 1 - Math.pow(1 - fade, 4);
    highlight.fillMat.uniforms.uAlpha.value = eased * 0.52;
    highlight.lineMat.uniforms.uAlpha.value = eased * 0.95;
    if (eased <= 0.001) {
      scene.remove(highlight.group);
      disposeBuildingHighlight(highlight);
      buildingHighlights.delete(index);
    }
  }
}

window.addEventListener('pointermove', queueBuildingHover, { passive: true });
window.addEventListener('pointerleave', clearBuildingHover);
window.addEventListener('blur', clearBuildingHover);

// ---------- resize ----------
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  sharedUniforms.uPixelRatio.value = renderer.getPixelRatio();
});

// ---------- animate ----------
const clock = new THREE.Clock();

function updateStreams(dt) {
  if (!streamGeo || !riverCurve) return;
  const arr = streamGeo.attributes.position.array;
  const tan = new THREE.Vector3();
  const p = new THREE.Vector3();
  for (let i = 0; i < STREAM_COUNT; i++) {
    sT[i] += sSpeed[i] * dt * sSide[i] * 0.5 * particleSettings.streamSpeed;
    if (sT[i] > 1) sT[i] -= 1;
    if (sT[i] < 0) sT[i] += 1;
    riverCurve.getPoint(sT[i], p);
    riverCurve.getTangent(sT[i], tan);
    const nx = -tan.z, nz = tan.x;
    const ix = i * 3;
    arr[ix+0] = p.x + nx * sOff[i];
    arr[ix+1] = 1.5 + Math.sin(sT[i] * 40 + i) * 0.3;
    arr[ix+2] = p.z + nz * sOff[i];
  }
  streamGeo.attributes.position.needsUpdate = true;
}

function updateEmbers(dt) {
  if (!eGeo) return;
  const arr = eGeo.attributes.position.array;
  const speed = particleSettings.emberSpeed;
  const t = clock.elapsedTime * speed;
  // pseudo-curl-noise velocity field (divergence-free-ish) for swirling, flowy motion
  // — each particle reads the field at its own position so neighbors stay coherent
  for (let i = 0; i < EMBER_COUNT; i++) {
    const ix = i * 3;
    const px = arr[ix + 0], py = arr[ix + 1], pz = arr[ix + 2];
    const f1 = 0.0035, f2 = 0.0055, f3 = 0.0042;
    const highAir = Math.min(1, Math.max(0, (py - 38) / 180));
    const vx = (Math.sin(pz * f1 + t * 0.32) + Math.cos(py * f2 + t * 0.41)) * 9 + 2.2 + highAir * 5.4;
    const vy = (Math.sin(px * f3 + t * 0.27) - Math.cos(pz * f1 + t * 0.34)) * 2.2;
    const vz = (Math.cos(px * f1 + t * 0.39) - Math.sin(py * f2 + t * 0.30)) * 9 + highAir * 2.1;
    arr[ix + 0] = px + vx * dt * speed;
    arr[ix + 1] = py + vy * dt * speed;
    arr[ix + 2] = pz + vz * dt * speed;
    // wrap within flow bounds
    const B = FLOW_BOUND;
    if (arr[ix + 0] >  B) arr[ix + 0] = -B;
    if (arr[ix + 0] < -B) arr[ix + 0] =  B;
    if (arr[ix + 2] >  B) arr[ix + 2] = -B;
    if (arr[ix + 2] < -B) arr[ix + 2] =  B;
    if (arr[ix + 1] > 260) arr[ix + 1] = 1;
    if (arr[ix + 1] < 0)   arr[ix + 1] = 260;
  }
  eGeo.attributes.position.needsUpdate = true;
}

function tick() {
  const dt = Math.min(0.05, clock.getDelta());
  sharedUniforms.uTime.value = clock.elapsedTime;
  updateStreams(dt);
  updateTraffic(dt);
  updateEmbers(dt);
  updateBuildingHighlights(performance.now() / 1000);
  updateCameraAnimation(performance.now());
  controls.update();
  composer.render();
  requestAnimationFrame(tick);
}

// ============================================================
// BOOT
// ============================================================
(async function boot() {
  try {
    const data = await fetchOverpass();
    buildFromOSM(data);
    buildBuildingMeshes(projectedBuildings);   // depth-only invisible occluders
    buildBuildingWireframes(projectedBuildings);
    buildTraffic();
    buildStreams();
    buildEmbers();
  } catch (e) {
    console.error(e);
    lblText.textContent = 'Map data unavailable';
  }
  loader.classList.add('gone');
  setTimeout(() => loader.remove(), 900);
  tick();
})();
</script>
