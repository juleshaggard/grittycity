<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Solar Panel Farm - Wireframe Particle Simulation</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body {
    margin: 0; padding: 0; background: #ffffff; color: #2a2a2e;
    font-family: -apple-system, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow: hidden; height: 100%;
  }
  #app { position: fixed; inset: 0; }
  .hud {
    position: fixed; left: 20px; bottom: 18px; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(40, 40, 48, 0.55); pointer-events: none; user-select: none;
  }
  .hud b { color: rgba(20, 20, 24, 0.85); font-weight: 500; }
  .corner {

  }
  .corner small { display: block; color: rgba(40, 40, 48, 0.35); font-size: 9px; margin-top: 4px; }
  .robot-debug {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 70;
    width: 286px;
    max-height: calc(100vh - 36px);
    overflow: auto;
    padding: 12px;
    background: rgba(250, 250, 252, 0.94);
    border: 1px solid rgba(40, 40, 48, 0.14);
    color: rgba(28, 28, 32, 0.78);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 12px 34px rgba(40, 40, 48, 0.08);
  }
  .robot-debug__head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    color: rgba(20, 20, 24, 0.9);
    letter-spacing: 0.18em;
  }
  .robot-debug__title {
    display: grid;
    gap: 3px;
  }
  .robot-debug__title small {
    color: rgba(40, 40, 48, 0.42);
    font-size: 8px;
    letter-spacing: 0.14em;
  }
  .robot-debug__section {
    margin: 11px 0 7px;
    color: rgba(20, 20, 24, 0.78);
    letter-spacing: 0.18em;
  }
  .robot-debug__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .robot-debug label {
    display: grid;
    gap: 4px;
  }
  .robot-debug input,
  .robot-debug textarea {
    width: 100%;
    border: 1px solid rgba(40, 40, 48, 0.16);
    background: rgba(255, 255, 255, 0.82);
    color: rgba(20, 20, 24, 0.82);
    font: 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: 0;
    padding: 6px;
    outline: none;
  }
  .robot-debug input:focus,
  .robot-debug textarea:focus {
    border-color: rgba(20, 20, 24, 0.38);
  }
  .robot-debug textarea {
    height: 112px;
    margin-top: 8px;
    resize: none;
    text-transform: none;
  }
  .robot-debug__actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .robot-debug__actions--wrap button {
    min-width: 120px;
  }
  .robot-debug button {
    flex: 1;
    min-width: 74px;
    border: 1px solid rgba(40, 40, 48, 0.18);
    background: rgba(255, 255, 255, 0.72);
    padding: 7px 8px;
    color: rgba(20, 20, 24, 0.76);
    font: inherit;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;

  .robot-debug button:hover {

<script type="module">

import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('app');
const lblText = document.getElementById('lblText');
const loader = document.getElementById('loader');
const robotDebugEls = {

  setCameraKeyA: document.getElementById('setCameraKeyA'),
  setCameraKeyB: document.getElementById('setCameraKeyB'),
  returnCameraKeyA: document.getElementById('returnCameraKeyA'),
  returnCameraKeyB: document.getElementById('returnCameraKeyB'),
  playCameraMove: document.getElementById('playCameraMove'),
  resetCameraMove: document.getElementById('resetCameraMove'),
  shotLowOrbit: document.getElementById('shotLowOrbit'),
  shotTopographic: document.getElementById('shotTopographic'),
  shotMacro: document.getElementById('shotMacro'),
  shotHorizonSweep: document.getElementById('shotHorizonSweep'),
};
const hudEls = {
  status: document.getElementById('solarHudStatus'),
};

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const DEFAULT_CAMERA_X = -62.6;
const DEFAULT_CAMERA_Y = 3.7;
const DEFAULT_CAMERA_Z = -255.1;
const DEFAULT_TARGET_X = -181.3;
const DEFAULT_TARGET_Y = -32.3;
const DEFAULT_TARGET_Z = -196.7;
const DEFAULT_CAMERA_FOV = 68;
const DEFAULT_CAMERA_ZOOM = 1;
const DEFAULT_CAMERA_NEAR = 1;
const DEFAULT_CAMERA_FAR = 8000;
const DEFAULT_FADE_NEAR = 8;
const DEFAULT_FADE_FAR = 70;
const SOLAR_ARRAY_GRID_SPACING = 210;

const camera = new THREE.PerspectiveCamera(
  DEFAULT_CAMERA_FOV,
  window.innerWidth / window.innerHeight,
  DEFAULT_CAMERA_NEAR,
  DEFAULT_CAMERA_FAR
);
camera.position.set(DEFAULT_CAMERA_X, DEFAULT_CAMERA_Y, DEFAULT_CAMERA_Z);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 45;
controls.maxDistance = 2700;
controls.maxPolarAngle = Math.PI * 0.58;
controls.target.set(DEFAULT_TARGET_X, DEFAULT_TARGET_Y, DEFAULT_TARGET_Z);
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.PAN,
  RIGHT: THREE.MOUSE.PAN,
};

const GLOBE_R = 5200;
const greyA  = new THREE.Color('#b0b0b5');
const greyB  = new THREE.Color('#8a8a90');
const greyC  = new THREE.Color('#cccdd0');
const yellow = greyC;
const yellowB = greyB;
const accentYellow = new THREE.Color('#FCE132');

function makeSpriteTexture() {
  const s = 256;
  const c = document.createElement('canvas');
  c.width = c.height = s;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  g.addColorStop(0.00, 'rgba(255,255,255,1.00)');
  g.addColorStop(0.10, 'rgba(255,255,255,0.85)');
  g.addColorStop(0.28, 'rgba(255,255,255,0.42)');
  g.addColorStop(0.55, 'rgba(255,255,255,0.14)');
  g.addColorStop(0.80, 'rgba(255,255,255,0.04)');
  g.addColorStop(1.00, 'rgba(255,255,255,0.00)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, s, s);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const sprite = makeSpriteTexture();
const sharedUniforms = {
  uTime: { value: 0 },
  uMap: { value: sprite },
  uPixelRatio: { value: renderer.getPixelRatio() },
  uSphereR: { value: GLOBE_R },
  uFadeNear: { value: DEFAULT_FADE_NEAR },
  uFadeFar:  { value: DEFAULT_FADE_FAR },
  uBgColor:  { value: new THREE.Color(0xffffff) },
  uWobble:   { value: 0.28 },
};

const SKID_STATE_KEY = 'solar-skidsteer-transform-v1';
const CAMERA_STATE_KEY = 'solar-camera-transform-v1';
const CAMERA_ANIMATION_STATE_KEY = 'solar-camera-animation-v1';
const PARTICLE_STATE_KEY = 'solar-particle-densities-v1';
const DEBUG_PANEL_STATE_KEY = 'solar-debug-panel-v1';
const DEFAULT_SKID_X = -170.81;
const DEFAULT_SKID_Z = -238.74;
const DEFAULT_SKID_ROTATION = -0.18;
const DEFAULT_SKID_SCALE = 0.48;
const DEFAULT_CAMERA_ANIMATION_DURATION = 4;
const DEFAULT_PARTICLE_DENSITY = 1;
const PARTICLE_DENSITY_MAX = 4;
const skidState = {
  x: 0,
  z: 0,
  rotation: 0,
  scale: DEFAULT_SKID_SCALE,
  initialized: false,
};
const cameraAnimation = {
  active: false,
  startedAt: 0,
  duration: DEFAULT_CAMERA_ANIMATION_DURATION,
  keyA: null,
  keyB: null,
};
let skidSteerGroup = null;
let suppressRobotInput = false;
let suppressCameraInput = false;
let suppressParticleInput = false;
let robotMoveMode = false;
let activeCameraShotName = 'Custom';
let solarPanelCount = 0;
let serviceParticleGeo = null;
let serviceParticleData = [];
const particleDensityUniforms = {
  panelGlints: { value: DEFAULT_PARTICLE_DENSITY },
  gridParticles: { value: DEFAULT_PARTICLE_DENSITY },
  atmosphere: { value: DEFAULT_PARTICLE_DENSITY },
};

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function degToRad(deg) {
  return deg * Math.PI / 180;
}

function radToDeg(rad) {
  return rad * 180 / Math.PI;
}

function roundForDebug(value, digits = 2) {
  return Number(value.toFixed(digits));
}

const pointVert = /* glsl */`
  attribute float aSize;
  attribute float aPhase;
  varying vec3 vColor;
  varying float vTwinkle;
  varying float vFade;
  varying float vBackface;
  varying float vDensitySeed;
  uniform float uTime;
  uniform float uPixelRatio;
  uniform float uSizeScale;
  uniform float uSphereR;
  uniform float uFadeNear;
  uniform float uFadeFar;
  uniform float uWobble;

  vec3 wrapSphere(vec3 p) {
    float R = uSphereR;
    if (R < 1.0) return p;
    float ax = p.z / R;
    float az = -p.x / R;
    float cx = cos(ax), sx = sin(ax);
    vec3 d = vec3(0.0, cx, sx);
    float cz = cos(az), sz = sin(az);
    vec3 dir = vec3(d.x * cz - d.y * sz,
                    d.x * sz + d.y * cz,
                    d.z);
    return vec3(0.0, -R, 0.0) + dir * (R + p.y);
  }

  void main() {
    vColor = color;
    vDensitySeed = fract(sin(aPhase * 78.233 + aSize * 12.9898) * 43758.5453);
    vTwinkle = 0.78 + 0.22 * sin(uTime * 1.6 + aPhase * 3.3);
    vec3 wob = vec3(
      sin(uTime * 0.7 + aPhase * 2.3),
      sin(uTime * 1.1 + aPhase * 1.7),
      cos(uTime * 0.8 + aPhase * 2.9)
    ) * uWobble;
    vec3 wp = wrapSphere(position + wob);
    vec3 outN = normalize(wp - vec3(0.0, -uSphereR, 0.0));
    vec3 toCam = normalize(cameraPosition - wp);
    vBackface = dot(outN, toCam);
    vec4 mv = modelViewMatrix * vec4(wp, 1.0);
    gl_Position = projectionMatrix * mv;
    float dist = -mv.z;
    vFade = clamp(1.0 - (dist - uFadeNear) / max(1.0, uFadeFar - uFadeNear), 0.0, 1.0);
    float size = aSize * uSizeScale * 140.0 * uPixelRatio;
    float hazePuff = 1.0 + vFade * 1.6;
    gl_PointSize = max(1.5, (size / max(0.001, dist)) * hazePuff);
  }
`;

const pointFrag = /* glsl */`
  varying vec3 vColor;
  varying float vTwinkle;
  varying float vFade;
  varying float vBackface;
  varying float vDensitySeed;
  uniform sampler2D uMap;
  uniform vec3 uBgColor;
  uniform float uDensity;

  void main() {
    float horizonFade = smoothstep(-0.28, 0.08, vBackface);
    float density = max(0.0, uDensity);
    if (vDensitySeed > min(density, 1.0)) discard;
    vec4 tex = texture2D(uMap, gl_PointCoord);
    if (tex.a < 0.02) discard;
    vec3 col = mix(vColor * vTwinkle, uBgColor, vFade * 0.95);
    float densityBoost = 1.0 + max(0.0, density - 1.0) * 0.32;
    float alpha = tex.a * (1.0 - vFade) * horizonFade * densityBoost;
    if (alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

function makePointsMaterial(sizeScale = 1.0, densityUniform = particleDensityUniforms.atmosphere) {
  return new THREE.ShaderMaterial({
    uniforms: { ...sharedUniforms, uSizeScale: { value: sizeScale }, uDensity: densityUniform },
    vertexShader: pointVert,
    fragmentShader: pointFrag,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.NormalBlending,
  });
}

const modelVert = /* glsl */`
  uniform float uSphereR;
  uniform float uFadeNear;
  uniform float uFadeFar;
  varying vec3 vNormalW;
  varying vec3 vWorldPos;
  varying float vFade;

  void main() {
    vec3 wp;
    vec3 wn;
    if (uSphereR < 1.0) {
      wp = position;
      wn = normal;
    } else {
      float R = uSphereR;
      float ax = position.z / R;
      float az = -position.x / R;
      float cx = cos(ax), sx = sin(ax);
      float cz = cos(az), sz = sin(az);
      mat3 Rx = mat3(
        1.0, 0.0, 0.0,
        0.0,  cx,  sx,
        0.0, -sx,  cx
      );
      mat3 Rz = mat3(
         cz, sz, 0.0,
        -sz, cz, 0.0,
        0.0, 0.0, 1.0
      );
      mat3 Rot = Rz * Rx;
      wp = Rot * vec3(0.0, R + position.y, 0.0) + vec3(0.0, -R, 0.0);
      wn = normalize(Rot * normal);
    }
    vNormalW = wn;
    vWorldPos = wp;
    vec4 mv = modelViewMatrix * vec4(wp, 1.0);
    gl_Position = projectionMatrix * mv;
    float dist = -mv.z;
    vFade = clamp((dist - 800.0) / 1900.0, 0.0, 1.0);
  }
`;

const modelFrag = /* glsl */`
  uniform vec3 uColor;
  uniform vec3 uBgColor;
  uniform float uGrainScale;
  uniform float uDiscardBase;
  uniform float uDiscardEdge;
  uniform float uSphereR;
  varying vec3 vNormalW;
  varying vec3 vWorldPos;
  varying float vFade;

  float hash13(vec3 p3) {
    p3 = fract(p3 * 0.1031);
    p3 += dot(p3, p3.zyx + 31.32);
    return fract((p3.x + p3.y) * p3.z);
  }

  void main() {
    vec3 sphereOutN = normalize(vWorldPos - vec3(0.0, -uSphereR, 0.0));
    vec3 sphereToCam = normalize(cameraPosition - vWorldPos);
    float horizonFade = smoothstep(-0.28, 0.08, dot(sphereOutN, sphereToCam));

    vec3 viewDir = normalize(cameraPosition - vWorldPos);
    float facing = abs(dot(normalize(vNormalW), viewDir));
    float grain = hash13(vWorldPos * uGrainScale);
    float threshold = uDiscardBase + uDiscardEdge * (1.0 - facing) + vFade * 0.16;
    if (grain < threshold) discard;

    vec3 lightDir = normalize(vec3(0.36, 0.94, 0.28));
    float ndl = max(0.0, dot(normalize(vNormalW), lightDir));
    float topness = clamp(vNormalW.y, 0.0, 1.0);
    vec3 col = uColor * mix(0.55, 1.28, topness * 0.44 + ndl * 0.56);
    col = mix(col, vec3(0.82, 0.82, 0.85), 0.12);
    col = mix(col, uBgColor, vFade * 0.44);
    gl_FragColor = vec4(col, horizonFade);
  }
`;

const wireVert = /* glsl */`
  uniform float uSphereR;
  uniform float uFadeNear;
  uniform float uFadeFar;
  varying float vFade;
  varying float vBackface;
  varying float vDepthLayer;

  void main() {
    vec3 wp;
    if (uSphereR < 1.0) {
      wp = position;
    } else {
      float R = uSphereR;
      float ax = position.z / R;
      float az = -position.x / R;
      float cx = cos(ax), sx = sin(ax);
      float cz = cos(az), sz = sin(az);
      mat3 Rx = mat3(1.0, 0.0, 0.0,  0.0, cx, sx,  0.0, -sx, cx);
      mat3 Rz = mat3(cz, sz, 0.0,  -sz, cz, 0.0,  0.0, 0.0, 1.0);
      mat3 Rot = Rz * Rx;
      wp = Rot * vec3(0.0, R + position.y, 0.0) + vec3(0.0, -R, 0.0);
    }
    vec3 outN = normalize(wp - vec3(0.0, -uSphereR, 0.0));
    vec3 toCam = normalize(cameraPosition - wp);
    vBackface = dot(outN, toCam);
    vec4 mv = modelViewMatrix * vec4(wp, 1.0);
    gl_Position = projectionMatrix * mv;
    float dist = -mv.z;
    vFade = clamp(1.0 - (dist - uFadeNear) / max(1.0, uFadeFar - uFadeNear), 0.0, 1.0);
    vDepthLayer = smoothstep(uFadeFar * 1.25, uFadeFar * 7.5, dist);
  }
`;

const wireFrag = /* glsl */`
  uniform vec3 uColor;
  uniform vec3 uBgColor;
  uniform float uAlpha;
  varying float vFade;
  varying float vBackface;
  varying float vDepthLayer;

  void main() {
    float horizonFade = smoothstep(-0.28, 0.08, vBackface);
    vec3 col = mix(uColor, uBgColor, clamp(vFade * 0.76 + vDepthLayer * 0.52, 0.0, 1.0));
    float closeAlpha = 1.0 - vFade * 0.95;
    float depthAlpha = mix(1.0, 0.16, vDepthLayer);
    float alpha = uAlpha * closeAlpha * depthAlpha * horizonFade;
    if (alpha < 0.01) discard;
    gl_FragColor = vec4(col, alpha);
  }
`;

function makeTransform(cx, cz, yaw, pitch, baseY = 1.55) {
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  return function transform(x, y, z) {
    const py = y * cp - z * sp;
    const pz = y * sp + z * cp;
    return [
      cx + x * cy - pz * sy,
      baseY + py,
      cz + x * sy + pz * cy,
    ];
  };
}

function addBox(buffers, cx, cz, w, h, d, yaw, pitch, baseY = 1.55) {
  const transform = makeTransform(cx, cz, yaw, pitch, baseY);
  const hx = w * 0.5, hy = h * 0.5, hz = d * 0.5;
  const corners = [
    transform(-hx, -hy, -hz), transform( hx, -hy, -hz), transform( hx, -hy,  hz), transform(-hx, -hy,  hz),
    transform(-hx,  hy, -hz), transform( hx,  hy, -hz), transform( hx,  hy,  hz), transform(-hx,  hy,  hz),
  ];
  if (!buffers) return { corners };

  const faceDefs = [
    [0,1,2,3], [4,7,6,5], [1,5,6,2],
    [0,3,7,4], [3,2,6,7], [0,4,5,1],
  ];
  for (const face of faceDefs) {
    const a = corners[face[0]], b = corners[face[1]], c = corners[face[2]], d0 = corners[face[3]];
    const ab = new THREE.Vector3(b[0] - a[0], b[1] - a[1], b[2] - a[2]);
    const ac = new THREE.Vector3(c[0] - a[0], c[1] - a[1], c[2] - a[2]);
    const n = new THREE.Vector3().crossVectors(ab, ac).normalize();
    const start = buffers.positions.length / 3;
    for (const p of [a, b, c, d0]) {
      buffers.positions.push(p[0], p[1], p[2]);
      buffers.normals.push(n.x, n.y, n.z);
      if (buffers.hoverCenters) buffers.hoverCenters.push(cx, cz);
    }
    buffers.indices.push(start, start + 1, start + 2, start, start + 2, start + 3);
  }
  return { corners };
}

function addLine(linePositions, a, b) {
  linePositions.push(a[0], a[1], a[2], b[0], b[1], b[2]);
}

const BOX_EDGES = [
  [0,1], [1,2], [2,3], [3,0], [4,5], [5,6],
  [6,7], [7,4], [0,4], [1,5], [2,6], [3,7],
];

function localToWorld(lx, lz, yaw, ox = 0, oz = 0) {
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  return [ox + lx * cy - lz * sy, oz + lx * sy + lz * cy];
}

function addWireBox(linePositions, cx, cz, w, h, d, yaw, pitch = 0, baseY = 1.55) {
  const { corners } = addBox(null, cx, cz, w, h, d, yaw, pitch, baseY);
  for (const edge of BOX_EDGES) addLine(linePositions, corners[edge[0]], corners[edge[1]]);
  return corners;
}

function addCircle(linePositions, center, radius, normalAxis = 'y', segments = 20) {
  const pts = [];
  for (let i = 0; i < segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    if (normalAxis === 'x') pts.push([center[0], center[1] + Math.cos(a) * radius, center[2] + Math.sin(a) * radius]);
    else if (normalAxis === 'z') pts.push([center[0] + Math.cos(a) * radius, center[1] + Math.sin(a) * radius, center[2]]);
    else pts.push([center[0] + Math.cos(a) * radius, center[1], center[2] + Math.sin(a) * radius]);
  }
  for (let i = 0; i < segments; i++) addLine(linePositions, pts[i], pts[(i + 1) % segments]);
}

function addJoint(linePositions, center, radius = 3.2) {
  addCircle(linePositions, center, radius, 'x', 22);
  addCircle(linePositions, center, radius * 0.75, 'y', 18);
}

function addLink(linePositions, a, b, thickness = 2.4) {
  const dx = b[0] - a[0], dz = b[2] - a[2];
  const yaw = Math.atan2(dx, dz);
  const len = Math.hypot(dx, dz);
  const cy = (a[1] + b[1]) * 0.5;
  const pitch = -Math.atan2(b[1] - a[1], len);
  addWireBox(linePositions, (a[0] + b[0]) * 0.5, (a[2] + b[2]) * 0.5, thickness, thickness, len, yaw, pitch, cy);
}

function normalizeCameraState(state) {
  const defaults = defaultCameraState();
  const near = clamp(Number.isFinite(state.near) ? state.near : defaults.near, 0.01, 2000);
  const far = Math.max(near + 1, Math.min(Number.isFinite(state.far) ? state.far : defaults.far, 50000));
  const fadeNear = clamp(Number.isFinite(state.fadeNear) ? state.fadeNear : defaults.fadeNear, 0, 10000);
  const fadeFar = Math.max(fadeNear + 0.1, Math.min(Number.isFinite(state.fadeFar) ? state.fadeFar : defaults.fadeFar, 20000));
  const zoom = clamp(Number.isFinite(state.zoom) ? state.zoom : defaults.zoom, 0.1, 10);
  return {
    x: Number.isFinite(state.x) ? state.x : defaults.x,
    y: Number.isFinite(state.y) ? state.y : defaults.y,
    z: Number.isFinite(state.z) ? state.z : defaults.z,
    targetX: Number.isFinite(state.targetX) ? state.targetX : defaults.targetX,
    targetY: Number.isFinite(state.targetY) ? state.targetY : defaults.targetY,
    targetZ: Number.isFinite(state.targetZ) ? state.targetZ : defaults.targetZ,
    fov: clamp(Number.isFinite(state.fov) ? state.fov : defaults.fov, 20, 100),
    zoom,
    near,
    far,
    fadeNear,
    fadeFar,
  };
}

function easeInOutExpo(t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  return t < 0.5
    ? Math.pow(2, 20 * t - 10) / 2
    : (2 - Math.pow(2, -20 * t + 10)) / 2;
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function lerpCameraStates(a, b, t) {
  const from = normalizeCameraState(a);
  const to = normalizeCameraState(b);
  return {
    x: lerp(from.x, to.x, t),
    y: lerp(from.y, to.y, t),
    z: lerp(from.z, to.z, t),
    targetX: lerp(from.targetX, to.targetX, t),
    targetY: lerp(from.targetY, to.targetY, t),
    targetZ: lerp(from.targetZ, to.targetZ, t),
    fov: lerp(from.fov, to.fov, t),
    zoom: lerp(from.zoom, to.zoom, t),
    near: lerp(from.near, to.near, t),
    far: lerp(from.far, to.far, t),
    fadeNear: lerp(from.fadeNear, to.fadeNear, t),
    fadeFar: lerp(from.fadeFar, to.fadeFar, t),
  };
}

    robotDebugEls.cameraAnimDuration.value = cameraAnimation.duration.toFixed(1);
  }
  if (robotDebugEls.playCameraMove) {
    robotDebugEls.playCameraMove.textContent = cameraAnimation.active ? 'Playing' : 'Play';
    robotDebugEls.playCameraMove.classList.toggle('active', cameraAnimation.active);

function stopCameraAnimation(updateUI = true) {
  if (!cameraAnimation.active) return;
  cameraAnimation.active = false;
  controls.enabled = true;
  if (updateUI) updateCameraAnimationDebug();
}

function setCameraKeyframe(slot) {
  stopCameraAnimation(false);
  cameraAnimation[slot] = currentCameraState();
  saveCameraAnimationState();
  updateCameraAnimationDebug();
}

function returnToCameraKeyframe(slot) {
  stopCameraAnimation(false);
  applyCameraState(cameraAnimation[slot] || defaultCameraState(), true);
  updateCameraAnimationDebug();
}

function resetCameraAnimation() {
  stopCameraAnimation(false);
  Object.assign(cameraAnimation, defaultCameraAnimationState(), { active: false, startedAt: 0 });
  saveCameraAnimationState();
  updateCameraAnimationDebug();
}

function startCameraAnimation() {
  const next = normalizeCameraAnimationState(cameraAnimation);
  cameraAnimation.duration = next.duration;
  cameraAnimation.keyA = next.keyA;
  cameraAnimation.keyB = next.keyB;
  cameraAnimation.active = true;
  cameraAnimation.startedAt = performance.now();
  controls.enabled = false;
  applyCameraState(cameraAnimation.keyA, false);
  saveCameraAnimationState();
  updateCameraAnimationDebug();
}

function updateCameraAnimation(now) {
  if (!cameraAnimation.active) return;
  const durationMs = Math.max(100, cameraAnimation.duration * 1000);
  const t = clamp((now - cameraAnimation.startedAt) / durationMs, 0, 1);
  const eased = easeInOutExpo(t);
  applyCameraState(lerpCameraStates(cameraAnimation.keyA, cameraAnimation.keyB, eased), false);
  if (t >= 1) {
    cameraAnimation.active = false;
    controls.enabled = true;
    applyCameraState(cameraAnimation.keyB, true);
    updateCameraAnimationDebug();
  }
}

function disposeSkidObject(object) {
  object.traverse((child) => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  });
}

function buildSkidSteerRobot(farmYaw = skidState.rotation) {
  ensureSkidState(farmYaw);
  if (skidSteerGroup) {
    scene.remove(skidSteerGroup);
    disposeSkidObject(skidSteerGroup);
  }

  const linePositions = [];
  const accentPositions = [];
  const originX = skidState.x;
  const originZ = skidState.z;
  const yaw = skidState.rotation;
  const modelScale = skidState.scale;

  function place(lx, lz) {
    return localToWorld(lx * modelScale, lz * modelScale, yaw, originX, originZ);
  }
  function box(lx, lz, w, h, d, baseY, pitch = 0, target = linePositions) {
    const [x, z] = place(lx, lz);
    return addWireBox(target, x, z, w * modelScale, h * modelScale, d * modelScale, yaw, pitch, baseY * modelScale);
  }
  function point(lx, y, lz) {
    const [x, z] = place(lx, lz);
    return [x, y * modelScale, z];
  }

  box(-13.5, 0, 6.2, 5.5, 34, 3.2);
  box(13.5, 0, 6.2, 5.5, 34, 3.2);
  box(0, -2, 25, 10, 28, 7.2);
  box(0, -11, 18, 7, 10, 13.2);
  box(0, 5, 18, 15, 14, 18.8);
  box(0, 10.5, 13, 11, 10, 27.2);

  for (const lx of [-13.5, 13.5]) {
    for (const lz of [-12, 0, 12]) {
      const p = point(lx, 3.1, lz);
      addCircle(accentPositions, p, 2.6 * modelScale, 'x', 18);
      addCircle(accentPositions, p, 1.5 * modelScale, 'x', 14);
    }
  }

  const loaderLeftA = point(-10.5, 15, 1);
  const loaderLeftB = point(-12.5, 23, 18);
  const loaderRightA = point(10.5, 15, 1);
  const loaderRightB = point(12.5, 23, 18);
  addLink(linePositions, loaderLeftA, loaderLeftB, 1.7);
  addLink(linePositions, loaderRightA, loaderRightB, 1.7);
  addLine(accentPositions, loaderLeftB, loaderRightB);

  const pedestal = box(0, 1, 10, 8, 10, 22.8);
  const shoulder = point(0, 30, 3);
  const elbow = point(12, 44, 20);
  const wrist = point(-5, 35, 39);
  const tool = point(-9, 28, 49);
  addJoint(accentPositions, shoulder, 4.2 * modelScale);
  addJoint(accentPositions, elbow, 3.6 * modelScale);
  addJoint(accentPositions, wrist, 2.8 * modelScale);
  addLink(linePositions, shoulder, elbow, 3.2 * modelScale);
  addLink(linePositions, elbow, wrist, 2.7 * modelScale);
  addLink(linePositions, wrist, tool, 2.0 * modelScale);

  const gripperA = point(-16, 27, 54);
  const gripperB = point(-2, 27, 55);
  addLine(linePositions, tool, gripperA);
  addLine(linePositions, tool, gripperB);
  addLine(linePositions, gripperA, point(-18, 25, 58));
  addLine(linePositions, gripperB, point(0, 25, 59));

  for (const corner of pedestal) addLine(accentPositions, corner, shoulder);

  skidSteerGroup = new THREE.Group();
  skidSteerGroup.name = 'skidsteer-robot';

  const bodyGeo = new THREE.BufferGeometry();
  bodyGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
  const bodyMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#55565d') },
      uAlpha: { value: 0.86 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  skidSteerGroup.add(new THREE.LineSegments(bodyGeo, bodyMat));

  const accentGeo = new THREE.BufferGeometry();
  accentGeo.setAttribute('position', new THREE.Float32BufferAttribute(accentPositions, 3));
  const accentMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#8f9096') },
      uAlpha: { value: 0.56 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  skidSteerGroup.add(new THREE.LineSegments(accentGeo, accentMat));
  scene.add(skidSteerGroup);
  updateRobotDebug();
}

function buildPanelFarm() {
  lblText.textContent = 'Generating panel modules...';
  const panels = [];
  const yaw = -0.18;
  const pitch = -0.34;
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const gridSpacing = SOLAR_ARRAY_GRID_SPACING;
  const arraySlots = [
    { gx: -4, gz: -4, cols: 24, rows: 16 },
    { gx: -2, gz: -4, cols: 28, rows: 16 },
    { gx:  0, gz: -4, cols: 28, rows: 16 },
    { gx:  2, gz: -4, cols: 28, rows: 16 },
    { gx:  4, gz: -4, cols: 24, rows: 16 },

    { gx: -4, gz: -2, cols: 24, rows: 18 },
    { gx: -2, gz: -2, cols: 30, rows: 18 },
    { gx:  0, gz: -2, cols: 30, rows: 18 },
    { gx:  2, gz: -2, cols: 30, rows: 18 },
    { gx:  4, gz: -2, cols: 24, rows: 18 },

    { gx: -4, gz:  0, cols: 24, rows: 18 },
    { gx: -2, gz:  0, cols: 30, rows: 18 },
    { gx:  0, gz:  0, cols: 30, rows: 18 },
    { gx:  2, gz:  0, cols: 30, rows: 18 },
    { gx:  4, gz:  0, cols: 24, rows: 18 },

    { gx: -4, gz:  2, cols: 24, rows: 16 },
    { gx: -2, gz:  2, cols: 28, rows: 16 },
    { gx:  0, gz:  2, cols: 28, rows: 16 },
    { gx:  2, gz:  2, cols: 28, rows: 16 },
    { gx:  4, gz:  2, cols: 24, rows: 16 },
  ];
  const blocks = arraySlots.map(slot => {
    const localX = slot.gx * gridSpacing;
    const localZ = slot.gz * gridSpacing;
    return {
      cx: localX * cy - localZ * sy,
      cz: localX * sy + localZ * cy,
      localX,
      localZ,
      cols: slot.cols,
      rows: slot.rows,
    };
  });
  const panelW = 10.5;
  const panelD = 4.25;
  const panelT = 0.42;
  const colGap = 2.2;
  const rowGap = 4.8;
  const tmp = new THREE.Vector3();

  for (const block of blocks) {
    for (let r = 0; r < block.rows; r++) {
      for (let c = 0; c < block.cols; c++) {
        const lx = (c - (block.cols - 1) * 0.5) * (panelW + colGap);
        const lz = (r - (block.rows - 1) * 0.5) * (panelD + rowGap);
        tmp.set(
          block.cx + lx * cy - lz * sy,
          0,
          block.cz + lx * sy + lz * cy
        );
        panels.push({
          cx: tmp.x,
          cz: tmp.z,
          w: panelW,
          d: panelD,
          t: panelT,
          yaw,
          pitch,
        });
      }
    }
  }

  const wirePositions = [];
  const railPositions = [];
  const supportPositions = [];
  const cellPositions = [];
  const leadingEdgePositions = [];
  const glintPositions = [];
  const glintColors = [];
  const glintSizes = [];
  const glintPhases = [];
  const lineColor = new THREE.Color();

  for (let i = 0; i < panels.length; i++) {
    const p = panels[i];
    const { corners } = addBox(null, p.cx, p.cz, p.w, p.t, p.d, p.yaw, p.pitch);
    const edges = [
      [0,1], [1,2], [2,3], [3,0], [4,5], [5,6],
      [6,7], [7,4], [0,4], [1,5], [2,6], [3,7],
    ];
    for (const e of edges) addLine(wirePositions, corners[e[0]], corners[e[1]]);

    const transform = makeTransform(p.cx, p.cz, p.yaw, p.pitch);
    const cellY = p.t * 0.88;
    for (const x of [-p.w * 0.24, 0, p.w * 0.24]) {
      addLine(cellPositions, transform(x, cellY, -p.d * 0.42), transform(x, cellY, p.d * 0.42));
    }
    for (const z of [-p.d * 0.18, p.d * 0.18]) {
      addLine(cellPositions, transform(-p.w * 0.42, cellY, z), transform(p.w * 0.42, cellY, z));
    }
    addLine(cellPositions, transform(-p.w * 0.38, cellY, -p.d * 0.34), transform(p.w * 0.38, cellY, p.d * 0.34));
    addLine(leadingEdgePositions, transform(-p.w * 0.5, p.t * 0.78, p.d * 0.5), transform(p.w * 0.5, p.t * 0.78, p.d * 0.5));

    const topZs = [-p.d * 0.17, p.d * 0.17];
    for (const z of topZs) {
      addLine(railPositions, transform(-p.w * 0.46, p.t * 0.76, z), transform(p.w * 0.46, p.t * 0.76, z));
    }
    addLine(railPositions, transform(0, p.t * 0.8, -p.d * 0.48), transform(0, p.t * 0.8, p.d * 0.48));

    if (i % 2 === 0) {
      const feet = [
        transform(-p.w * 0.36, -p.t * 0.58, p.d * 0.28),
        transform( p.w * 0.36, -p.t * 0.58, p.d * 0.28),
      ];
      for (const foot of feet) addLine(supportPositions, [foot[0], 0.08, foot[2]], foot);
    }

    for (let s = 0; s < 4; s++) {
      const gx = -p.w * 0.42 + Math.random() * p.w * 0.84;
      const gz = -p.d * 0.40 + Math.random() * p.d * 0.80;
      const g = transform(gx, p.t * 0.86, gz);
      glintPositions.push(g[0], g[1] + 0.08, g[2]);
      if (Math.random() < 0.035) lineColor.copy(accentYellow).lerp(greyC, Math.random() * 0.18);
      else if (Math.random() < 0.58) lineColor.copy(yellow).lerp(yellowB, Math.random() * 0.4);
      else lineColor.copy(greyA).lerp(greyC, Math.random() * 0.45);
      glintColors.push(lineColor.r, lineColor.g, lineColor.b);
      glintSizes.push(1.15 + Math.random() * 1.25);
      glintPhases.push(Math.random() * Math.PI * 2);
    }
  }

  const wireGeo = new THREE.BufferGeometry();
  wireGeo.setAttribute('position', new THREE.Float32BufferAttribute(wirePositions, 3));
  const wireMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#77787f') },
      uAlpha: { value: 0.74 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  scene.add(new THREE.LineSegments(wireGeo, wireMat));

  const cellGeo = new THREE.BufferGeometry();
  cellGeo.setAttribute('position', new THREE.Float32BufferAttribute(cellPositions, 3));
  const cellMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#bbbcc2') },
      uAlpha: { value: 0.24 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  scene.add(new THREE.LineSegments(cellGeo, cellMat));

  const edgeGeo = new THREE.BufferGeometry();
  edgeGeo.setAttribute('position', new THREE.Float32BufferAttribute(leadingEdgePositions, 3));
  const edgeMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#5f6067') },
      uAlpha: { value: 0.70 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  scene.add(new THREE.LineSegments(edgeGeo, edgeMat));

  const detailGeo = new THREE.BufferGeometry();
  detailGeo.setAttribute('position', new THREE.Float32BufferAttribute(railPositions.concat(supportPositions), 3));
  const detailMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#aeb0b7') },
      uAlpha: { value: 0.34 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  scene.add(new THREE.LineSegments(detailGeo, detailMat));

  const glintGeo = new THREE.BufferGeometry();
  glintGeo.setAttribute('position', new THREE.Float32BufferAttribute(glintPositions, 3));
  glintGeo.setAttribute('color', new THREE.Float32BufferAttribute(glintColors, 3));
  glintGeo.setAttribute('aSize', new THREE.Float32BufferAttribute(glintSizes, 1));
  glintGeo.setAttribute('aPhase', new THREE.Float32BufferAttribute(glintPhases, 1));
  scene.add(new THREE.Points(glintGeo, makePointsMaterial(1.08, particleDensityUniforms.panelGlints)));

  buildServiceGrid(blocks, yaw);
  buildInverterBoxes(yaw);
  buildServiceMachines(yaw);
  buildSkidSteerRobot(yaw);
  return panels.length;
}

function buildServiceGrid(blocks, yaw) {
  lblText.textContent = 'Wiring service lanes...';
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const linePositions = [];
  const particlePos = [];
  const particleCol = [];
  const particleSize = [];
  const particlePhase = [];
  serviceParticleData = [];
  const c = new THREE.Color();

  function local(x, z) {
    return [x * cy - z * sy, 0.16, x * sy + z * cy];
  }

  function addWrappedRun(run) {
    const [x0, z0, x1, z1] = run;
    const len = Math.hypot(x1 - x0, z1 - z0);
    const segments = Math.max(10, Math.ceil(len / 34));
    let prev = local(x0, z0);
    for (let i = 1; i <= segments; i++) {
      const t = i / segments;
      const next = local(
        x0 + (x1 - x0) * t,
        z0 + (z1 - z0) * t
      );
      addLine(linePositions, prev, next);
      prev = next;
    }
  }

  const serviceRuns = [];
  const domeExtent = 3250;
  const minorExtent = 2700;
  const gridSpacing = SOLAR_ARRAY_GRID_SPACING;
  const gridHalf = gridSpacing * 7;
  for (let z = -gridHalf; z <= gridHalf; z += gridSpacing) {
    serviceRuns.push([-domeExtent, z, domeExtent, z]);
  }
  for (let x = -gridHalf; x <= gridHalf; x += gridSpacing) {
    serviceRuns.push([x, -minorExtent, x, minorExtent]);
  }

  for (const run of serviceRuns) {
    const a = local(run[0], run[1]);
    const b = local(run[2], run[3]);
    addWrappedRun(run);
    const len = Math.hypot(b[0] - a[0], b[2] - a[2]);
    const steps = Math.floor(len / 8.5);
    for (let i = 0; i < steps; i++) {
      const t = i / Math.max(1, steps - 1);
      const y = 0.22 + Math.random() * 0.2;
      const x = a[0] + (b[0] - a[0]) * t + (Math.random() - 0.5) * 1.4;
      const z = a[2] + (b[2] - a[2]) * t + (Math.random() - 0.5) * 1.4;
      particlePos.push(x, y, z);
      serviceParticleData.push({
        ax: a[0],
        az: a[2],
        bx: b[0],
        bz: b[2],
        t,
        y,
        speed: (0.012 + Math.random() * 0.034) * (Math.random() < 0.5 ? -1 : 1),
        jitter: 0.25 + Math.random() * 0.65,
        phase: Math.random() * Math.PI * 2,
      });
      if (Math.random() < 0.055) c.copy(accentYellow).lerp(greyC, Math.random() * 0.18);
      else if (Math.random() < 0.22) c.copy(yellow).lerp(yellowB, Math.random() * 0.5);
      else c.copy(greyA).lerp(greyB, Math.random() * 0.6);
      particleCol.push(c.r, c.g, c.b);
      particleSize.push(0.95 + Math.random() * 0.7);
      particlePhase.push(Math.random() * Math.PI * 2);
    }
  }

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
  const lineMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#c4c5ca') },
      uAlpha: { value: 0.20 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
  });
  scene.add(new THREE.LineSegments(lineGeo, lineMat));

  const pointGeo = new THREE.BufferGeometry();
  pointGeo.setAttribute('position', new THREE.Float32BufferAttribute(particlePos, 3));
  pointGeo.setAttribute('color', new THREE.Float32BufferAttribute(particleCol, 3));
  pointGeo.setAttribute('aSize', new THREE.Float32BufferAttribute(particleSize, 1));
  pointGeo.setAttribute('aPhase', new THREE.Float32BufferAttribute(particlePhase, 1));
  serviceParticleGeo = pointGeo;
  scene.add(new THREE.Points(pointGeo, makePointsMaterial(0.9, particleDensityUniforms.gridParticles)));
}

function updateServiceGridParticles(dt, elapsed) {
  if (!serviceParticleGeo || !serviceParticleData.length) return;
  const arr = serviceParticleGeo.attributes.position.array;
  for (let i = 0; i < serviceParticleData.length; i++) {
    const d = serviceParticleData[i];
    d.t += d.speed * dt;
    if (d.t > 1) d.t -= 1;
    if (d.t < 0) d.t += 1;
    const dx = d.bx - d.ax;
    const dz = d.bz - d.az;
    const len = Math.max(0.001, Math.hypot(dx, dz));
    const nx = -dz / len;
    const nz = dx / len;
    const sway = Math.sin(elapsed * 1.7 + d.phase) * d.jitter;
    const ix = i * 3;
    arr[ix + 0] = d.ax + dx * d.t + nx * sway;
    arr[ix + 1] = d.y + Math.sin(elapsed * 2.1 + d.phase) * 0.05;
    arr[ix + 2] = d.az + dz * d.t + nz * sway;
  }
  serviceParticleGeo.attributes.position.needsUpdate = true;
}

function buildInverterBoxes(yaw) {
  const boxes = [
    [-44, -18, 22, 10, 13],
    [48, -18, 22, 10, 13],
    [-48, 282, 20, 9, 12],
    [48, 282, 20, 9, 12],
    [-214, 506, 18, 8, 11],
    [232, 506, 18, 8, 11],
  ];
  const wires = [];
  const nodePositions = [];
  const nodeColors = [];
  const nodeSizes = [];
  const nodePhases = [];
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  for (const box of boxes) {
    const x = box[0] * cy - box[1] * sy;
    const z = box[0] * sy + box[1] * cy;
    const { corners } = addBox(null, x, z, box[2], box[3], box[4], yaw, 0);
    const edges = [
      [0,1], [1,2], [2,3], [3,0], [4,5], [5,6],
      [6,7], [7,4], [0,4], [1,5], [2,6], [3,7],
    ];
    for (const e of edges) addLine(wires, corners[e[0]], corners[e[1]]);
    nodePositions.push(x, 1.55 + box[3] * 0.64, z);
    nodeColors.push(accentYellow.r, accentYellow.g, accentYellow.b);
    nodeSizes.push(2.2 + Math.random() * 0.7);
    nodePhases.push(Math.random() * Math.PI * 2);
  }

  const wireGeo = new THREE.BufferGeometry();
  wireGeo.setAttribute('position', new THREE.Float32BufferAttribute(wires, 3));
  const wireMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#7e7f86') },
      uAlpha: { value: 0.62 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
  });
  scene.add(new THREE.LineSegments(wireGeo, wireMat));

  const nodeGeo = new THREE.BufferGeometry();
  nodeGeo.setAttribute('position', new THREE.Float32BufferAttribute(nodePositions, 3));
  nodeGeo.setAttribute('color', new THREE.Float32BufferAttribute(nodeColors, 3));
  nodeGeo.setAttribute('aSize', new THREE.Float32BufferAttribute(nodeSizes, 1));
  nodeGeo.setAttribute('aPhase', new THREE.Float32BufferAttribute(nodePhases, 1));
  scene.add(new THREE.Points(nodeGeo, makePointsMaterial(1.2, particleDensityUniforms.gridParticles)));
}

function buildServiceMachines(farmYaw) {
  const machines = [
    { lx: -640, lz: -640, rot:  0.18, scale: 0.34, variant: 'arm' },
    { lx:  -60, lz: -650, rot: -0.38, scale: 0.30, variant: 'mast' },
    { lx:  570, lz: -620, rot:  0.54, scale: 0.32, variant: 'cart' },
    { lx: -850, lz: -225, rot: -0.15, scale: 0.31, variant: 'cart' },
    { lx: -250, lz: -205, rot:  0.68, scale: 0.36, variant: 'arm' },
    { lx:  360, lz: -225, rot: -0.74, scale: 0.29, variant: 'mast' },
    { lx:  900, lz: -185, rot:  0.24, scale: 0.33, variant: 'arm' },
    { lx: -620, lz:  210, rot:  0.88, scale: 0.30, variant: 'mast' },
    { lx:   20, lz:  215, rot: -0.56, scale: 0.35, variant: 'arm' },
    { lx:  650, lz:  245, rot:  0.36, scale: 0.31, variant: 'cart' },
  ];
  const bodyPositions = [];
  const accentPositions = [];
  const toolPositions = [];

  function appendMachine(machine) {
    const [originX, originZ] = localToWorld(machine.lx, machine.lz, farmYaw);
    const yaw = farmYaw + machine.rot;
    const scale = machine.scale;

    function place(lx, lz) {
      return localToWorld(lx * scale, lz * scale, yaw, originX, originZ);
    }
    function point(lx, y, lz) {
      const [x, z] = place(lx, lz);
      return [x, y * scale, z];
    }
    function box(lx, lz, w, h, d, baseY, pitch = 0, target = bodyPositions) {
      const [x, z] = place(lx, lz);
      return addWireBox(target, x, z, w * scale, h * scale, d * scale, yaw, pitch, baseY * scale);
    }

    box(-11, 0, 5.2, 4.8, 28, 2.8);
    box( 11, 0, 5.2, 4.8, 28, 2.8);
    box(0, -2, 22, 8.5, 23, 6.7);
    box(0, -10, 15, 6.4, 8.5, 12.2);
    box(0, 6, 15, 11, 11, 16.6);

    for (const lx of [-11, 11]) {
      for (const lz of [-10, 2, 12]) {
        const p = point(lx, 2.8, lz);
        addCircle(accentPositions, p, 2.25 * scale, 'x', 16);
      }
    }

    if (machine.variant === 'cart') {
      box(0, 19, 25, 4.5, 14, 6.2, 0, accentPositions);
      addLine(accentPositions, point(-11, 8.4, 13), point(11, 8.4, 13));
      addLine(accentPositions, point(-8, 8.4, 25), point(8, 8.4, 25));
      addLine(toolPositions, point(-7, 8.8, 26), point(7, 8.8, 26));
      return;
    }

    const shoulder = point(0, machine.variant === 'mast' ? 30 : 25, 4);
    const elbow = machine.variant === 'mast'
      ? point(0, 48, 8)
      : point(12, 38, 22);
    const wrist = machine.variant === 'mast'
      ? point(-6, 42, 29)
      : point(-5, 31, 40);
    const tool = machine.variant === 'mast'
      ? point(-9, 34, 43)
      : point(-10, 25, 51);

    addJoint(accentPositions, shoulder, 3.3 * scale);
    addJoint(accentPositions, elbow, 3.0 * scale);
    addJoint(accentPositions, wrist, 2.35 * scale);
    addLink(bodyPositions, shoulder, elbow, 2.6 * scale);
    addLink(bodyPositions, elbow, wrist, 2.25 * scale);
    addLink(bodyPositions, wrist, tool, 1.8 * scale);
    addLine(toolPositions, tool, point(-16, 23, 56));
    addLine(toolPositions, tool, point(-4, 23, 57));
  }

  for (const machine of machines) appendMachine(machine);

  const group = new THREE.Group();
  group.name = 'service-machines';

  const bodyGeo = new THREE.BufferGeometry();
  bodyGeo.setAttribute('position', new THREE.Float32BufferAttribute(bodyPositions, 3));
  const bodyMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#696a71') },
      uAlpha: { value: 0.58 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  group.add(new THREE.LineSegments(bodyGeo, bodyMat));

  const accentGeo = new THREE.BufferGeometry();
  accentGeo.setAttribute('position', new THREE.Float32BufferAttribute(accentPositions, 3));
  const accentMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: new THREE.Color('#a3a4aa') },
      uAlpha: { value: 0.42 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  group.add(new THREE.LineSegments(accentGeo, accentMat));

  const toolGeo = new THREE.BufferGeometry();
  toolGeo.setAttribute('position', new THREE.Float32BufferAttribute(toolPositions, 3));
  const toolMat = new THREE.ShaderMaterial({
    uniforms: {
      uSphereR: sharedUniforms.uSphereR,
      uFadeNear: sharedUniforms.uFadeNear,
      uFadeFar: sharedUniforms.uFadeFar,
      uBgColor: sharedUniforms.uBgColor,
      uColor: { value: accentYellow },
      uAlpha: { value: 0.62 },
    },
    vertexShader: wireVert,
    fragmentShader: wireFrag,
    transparent: true,
    depthWrite: false,
    depthTest: true,
  });
  group.add(new THREE.LineSegments(toolGeo, toolMat));

  scene.add(group);
}

let eGeo;
const EMBER_COUNT = 15500;
const FLOW_BOUND = 1240;

function buildEmbers() {
  lblText.textContent = 'Seeding atmospheric particles...';
  eGeo = new THREE.BufferGeometry();
  const pos = new Float32Array(EMBER_COUNT * 3);
  const col = new Float32Array(EMBER_COUNT * 3);
  const sz  = new Float32Array(EMBER_COUNT);
  const ph  = new Float32Array(EMBER_COUNT);
  const c = new THREE.Color();

  for (let i = 0; i < EMBER_COUNT; i++) {
    pos[i*3+0] = (Math.random() * 2 - 1) * FLOW_BOUND;
    pos[i*3+1] = Math.random() < 0.74
      ? 0.4 + Math.random() * 24
      : 24 + Math.random() * 210;
    pos[i*3+2] = (Math.random() * 2 - 1) * FLOW_BOUND;
    if (Math.random() < 0.30) c.copy(yellow).lerp(yellowB, Math.random() * 0.45);
    else c.copy(greyA).lerp(greyB, Math.random() * 0.55);
    const r = Math.hypot(pos[i*3+0], pos[i*3+2]);
    c.multiplyScalar(Math.max(0.48, 1 - r / (FLOW_BOUND * 1.3)));
    col[i*3+0] = c.r;
    col[i*3+1] = c.g;
    col[i*3+2] = c.b;
    sz[i] = 1.0 + Math.random() * 1.45;
    ph[i] = Math.random() * Math.PI * 2;
  }
  eGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  eGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  eGeo.setAttribute('aSize', new THREE.BufferAttribute(sz, 1));
  eGeo.setAttribute('aPhase', new THREE.BufferAttribute(ph, 1));
  scene.add(new THREE.Points(eGeo, makePointsMaterial(0.95, particleDensityUniforms.atmosphere)));
}

function updateEmbers(dt, elapsed) {
  if (!eGeo) return;
  const arr = eGeo.attributes.position.array;
  for (let i = 0; i < EMBER_COUNT; i++) {
    const ix = i * 3;
    const px = arr[ix + 0], py = arr[ix + 1], pz = arr[ix + 2];
    const f1 = 0.0038, f2 = 0.0058, f3 = 0.0044;
    const vx = (Math.sin(pz * f1 + elapsed * 0.32) + Math.cos(py * f2 + elapsed * 0.41)) * 8.4;
    const vy = (Math.sin(px * f3 + elapsed * 0.27) - Math.cos(pz * f1 + elapsed * 0.34)) * 1.8;
    const vz = (Math.cos(px * f1 + elapsed * 0.39) - Math.sin(py * f2 + elapsed * 0.30)) * 8.4;
    arr[ix + 0] = px + vx * dt;
    arr[ix + 1] = py + vy * dt;
    arr[ix + 2] = pz + vz * dt;
    const B = FLOW_BOUND;
    if (arr[ix + 0] >  B) arr[ix + 0] = -B;
    if (arr[ix + 0] < -B) arr[ix + 0] =  B;
    if (arr[ix + 2] >  B) arr[ix + 2] = -B;
    if (arr[ix + 2] < -B) arr[ix + 2] =  B;
    if (arr[ix + 1] > 240) arr[ix + 1] = 0.4;
    if (arr[ix + 1] < 0)   arr[ix + 1] = 240;
  }
  eGeo.attributes.position.needsUpdate = true;
}

const composer = {
  render: () => renderer.render(scene, camera),
  setSize: (w, h) => renderer.setSize(w, h),
};

const groundRaycaster = new THREE.Raycaster();
const groundPointer = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const robotDragPoint = new THREE.Vector3();
const robotDrag = {
  active: false,
  pointerId: null,
  offsetX: 0,
  offsetZ: 0,
};

function getGroundPointFromEvent(event, target) {
  const rect = renderer.domElement.getBoundingClientRect();
  const x = (event.clientX - rect.left) / rect.width;
  const y = (event.clientY - rect.top) / rect.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return false;

  groundPointer.set(x * 2 - 1, -(y * 2 - 1));
  groundRaycaster.setFromCamera(groundPointer, camera);
  return !!groundRaycaster.ray.intersectPlane(groundPlane, target);
}

function robotHitRadius() {
  return Math.max(14, 44 * skidState.scale);
}

function isPointerOnRobot(event) {
  if (!skidState.initialized) return false;
  if (!getGroundPointFromEvent(event, robotDragPoint)) return false;
  return Math.hypot(robotDragPoint.x - skidState.x, robotDragPoint.z - skidState.z) <= robotHitRadius();
}

function startRobotDrag(event) {
  if (event.button !== 0) return;
  const canDrag = robotMoveMode
    ? getGroundPointFromEvent(event, robotDragPoint)
    : isPointerOnRobot(event);
  if (!canDrag) return;
  robotDrag.active = true;
  robotDrag.pointerId = event.pointerId;
  robotDrag.offsetX = skidState.x - robotDragPoint.x;
  robotDrag.offsetZ = skidState.z - robotDragPoint.z;
  controls.enabled = false;
  renderer.domElement.setPointerCapture(event.pointerId);
  event.preventDefault();
}

function moveRobotDrag(event) {
  if (!robotDrag.active) return false;
  if (getGroundPointFromEvent(event, robotDragPoint)) {
    skidState.x = robotDragPoint.x + robotDrag.offsetX;
    skidState.z = robotDragPoint.z + robotDrag.offsetZ;
    buildSkidSteerRobot();
    saveSkidState();
  }
  event.preventDefault();
  return true;
}

function endRobotDrag(event) {
  if (!robotDrag.active) return;
  if (event.pointerId === robotDrag.pointerId && renderer.domElement.hasPointerCapture(event.pointerId)) {
    renderer.domElement.releasePointerCapture(event.pointerId);
  }
  robotDrag.active = false;
  robotDrag.pointerId = null;
  controls.enabled = true;
  saveSkidState();
}

function handlePointerMove(event) {
  moveRobotDrag(event);
}

renderer.domElement.addEventListener('pointerdown', startRobotDrag);
window.addEventListener('pointermove', handlePointerMove, { passive: false });
window.addEventListener('pointerup', endRobotDrag);
window.addEventListener('pointercancel', endRobotDrag);
window.addEventListener('blur', () => {
  if (robotDrag.active) {
    robotDrag.active = false;
    controls.enabled = true;
  }
});

for (const input of [robotDebugEls.x, robotDebugEls.z, robotDebugEls.rotation, robotDebugEls.scale]) {
  input.addEventListener('input', applyRobotDebugInputs);
}

for (const input of cameraInputs()) {
  input.addEventListener('input', applyCameraDebugInputs);
}

for (const input of particleInputs()) {
  input.addEventListener('input', applyParticleDebugInputs);
}

robotDebugEls.cameraAnimDuration.addEventListener('input', applyCameraAnimationDurationInput);

controls.addEventListener('change', () => {
  saveCameraState();
  updateCameraDebug();
});

robotDebugEls.togglePanel.addEventListener('click', () => {
  setDebugPanelCollapsed(!robotDebugEls.panel.classList.contains('is-collapsed'));
});

robotDebugEls.move.addEventListener('click', () => {
  robotMoveMode = !robotMoveMode;
  updateRobotMoveModeUI();
});

robotDebugEls.copy.addEventListener('click', async () => {
  const value = robotDebugEls.data.value;
  try {
    await navigator.clipboard.writeText(value);
  } catch (e) {
    robotDebugEls.data.select();
    document.execCommand('copy');
  }
});

robotDebugEls.reset.addEventListener('click', () => {
  Object.assign(skidState, defaultSkidState(), { initialized: true });
  buildSkidSteerRobot();
  saveSkidState();
});

robotDebugEls.resetCamera.addEventListener('click', () => {
  stopCameraAnimation(false);
  activeCameraShotName = 'Custom';
  applyCameraState(defaultCameraState());
  updateCameraAnimationDebug();
});

robotDebugEls.setCameraKeyA.addEventListener('click', () => setCameraKeyframe('keyA'));
robotDebugEls.setCameraKeyB.addEventListener('click', () => setCameraKeyframe('keyB'));
robotDebugEls.returnCameraKeyA.addEventListener('click', () => returnToCameraKeyframe('keyA'));
robotDebugEls.returnCameraKeyB.addEventListener('click', () => returnToCameraKeyframe('keyB'));
robotDebugEls.playCameraMove.addEventListener('click', startCameraAnimation);
robotDebugEls.resetCameraMove.addEventListener('click', resetCameraAnimation);
robotDebugEls.shotLowOrbit.addEventListener('click', () => applyCameraShot('Low Orbit'));
robotDebugEls.shotTopographic.addEventListener('click', () => applyCameraShot('Topographic'));
robotDebugEls.shotMacro.addEventListener('click', () => applyCameraShot('Macro'));
robotDebugEls.shotHorizonSweep.addEventListener('click', () => applyCameraShot('Horizon Sweep'));

window.addEventListener('keydown', (event) => {
  const target = event.target;
  const isTyping = target && (
    target.tagName === 'INPUT' ||
    target.tagName === 'TEXTAREA' ||
    target.tagName === 'SELECT' ||
    target.isContentEditable
  );
  if (isTyping || event.metaKey || event.ctrlKey || event.altKey) return;
  if (event.key.toLowerCase() === 'p') {
    event.preventDefault();
    startCameraAnimation();
  }
});

applyCameraState(readSavedCameraState(), false);
Object.assign(cameraAnimation, readSavedCameraAnimationState(), { active: false, startedAt: 0 });
applyParticleState(readSavedParticleState(), false);
updateRobotMoveModeUI();
setDebugPanelCollapsed(readDebugPanelCollapsed(), false);
updateCameraDebug();
updateCameraAnimationDebug();
updateParticleDebug();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  sharedUniforms.uPixelRatio.value = renderer.getPixelRatio();
});

const clock = new THREE.Clock();

function tick() {
  const dt = Math.min(0.05, clock.getDelta());
  const elapsed = clock.elapsedTime;
  sharedUniforms.uTime.value = elapsed;
  updateServiceGridParticles(dt, elapsed);
  updateEmbers(dt, elapsed);
  updateCameraAnimation(performance.now());
  controls.update();
  composer.render();
  requestAnimationFrame(tick);
}

(function boot() {
  const panelCount = buildPanelFarm();
  solarPanelCount = panelCount;
  buildEmbers();
  lblText.textContent = `${panelCount.toLocaleString()} panels - wireframe array ready`;
  updateSceneHud();
  loader.classList.add('gone');
  setTimeout(() => loader.remove(), 900);
  tick();
})();
</script>
